            ${field("Năm học", "academicYear", item.academicYear || state.gpaFilter.academicYear || currentAcademicYear(), "text", true)}
            <div class="field">
              <label for="gradeCredits">Số tín chỉ</label>
              <input id="gradeCredits" name="credits" type="number" min="0.5" step="0.5" value="${escapeAttr(formatGpaInputValue(item.credits || 3))}" required />
              <div class="field-error" data-field-error-for="credits" hidden></div>
            </div>
            <div class="field">
              <label for="gradeScore10">Điểm hệ 10</label>
              <input id="gradeScore10" name="score10" type="number" min="0" max="10" step="0.1" value="${escapeAttr(formatGpaInputValue(item.score10 || 0))}" required />
              <div class="field-error" data-field-error-for="score10" hidden></div>
            </div>
            <div class="field" style="grid-column: 1 / -1;">
              <label class="soft-toggle">
                <input id="gradeIncludeInGpa" name="includeInGpa" type="checkbox" value="true" ${isIncludedInGpa(item.includeInGpa) ? "checked" : ""} />
                <span>Tính môn này vào GPA</span>
              </label>
            </div>
          </div>
          ${textareaField("Ghi chú", "note", item.note || "")}
          <div id="gradePreview" class="grade-preview"></div>
        `, async (formData, form) => {
          const payload = buildGradeRecordPayload({
            subjectId: String(formData.get("subjectId") || ""),
            subjectName: String(formData.get("subjectName") || ""),
            semester: String(formData.get("semester") || ""),
            academicYear: String(formData.get("academicYear") || ""),
            credits: formData.get("credits"),
            score10: formData.get("score10"),
            includeInGpa: Boolean(form && form.elements.includeInGpa && form.elements.includeInGpa.checked),
            note: String(formData.get("note") || "")
          });
          const savedRecord = record
            ? await api("updateGradeRecord", Object.assign({ id: record.id }, payload))
            : await api("createGradeRecord", payload);
          const changedScope = applyCrudResponseToState(record ? "updateGradeRecord" : "createGradeRecord", savedRecord);

          closeModal();
          showToast("Đã lưu điểm môn học.", "success");
          renderAfterDataMutation(changedScope);
        });

        syncGradeScorePreview();
      }

      /* ===== Browser fallback data layer ===== */
      function getMockAuthAccount() {
        return loadLocal(STORAGE_KEYS.mockAuthAccount, null);
      }

      function saveMockAuthAccount(account) {
        if (account) {
          saveLocal(STORAGE_KEYS.mockAuthAccount, account);
        } else {
          removeLocal(STORAGE_KEYS.mockAuthAccount);
        }
      }

      function buildMockAuthResponse(account) {
        const item = account || {};
        return {
          sessionToken: String(item.sessionToken || ""),
          expiresAt: String(item.expiresAt || ""),
          user: {
            id: String(item.userId || ""),
            customerId: String(item.customerId || ""),
            email: String(item.email || ""),
            displayName: String(item.displayName || "Sinh viên"),
            role: "owner",
            status: "active",
            lastLoginAt: String(item.lastLoginAt || ""),
            createdAt: String(item.createdAt || ""),
            updatedAt: String(item.updatedAt || "")
          },
          customer: {
            id: String(item.customerId || ""),
            name: String(item.customerName || "Không gian dữ liệu"),
            slug: String(item.customerSlug || "local"),
            ownerUserId: String(item.userId || ""),
            spreadsheetId: "mock-local",
            spreadsheetUrl: "",
            folderId: "",
            status: "active",
            createdAt: String(item.createdAt || ""),
            updatedAt: String(item.updatedAt || "")
          }
        };
      }

      function requireMockSession(payload) {
        const account = getMockAuthAccount();
        const sessionToken = String((payload && payload.sessionToken) || state.sessionToken || "").trim();

        if (!account || !account.sessionToken || !sessionToken || String(account.sessionToken) !== sessionToken) {
          throw new Error("Phiên đăng nhập không hợp lệ.");
        }

        return account;
      }

      function ensureMockSeedDataForUser(account) {
        const existing = loadLocal(STORAGE_KEYS.mockData, null);

        if (existing) {
          return;
        }

        const previousUserId = state.userId;
        const previousDisplayName = state.displayName;
        state.userId = String(account.userId || "");
        state.displayName = String(account.displayName || "Sinh viên");
        const seeded = createSeedData();
        seeded.settings = Object.assign(getDefaultSettings(), seeded.settings || {}, {
          userId: state.userId,
          displayName: state.displayName
        });
        saveLocal(STORAGE_KEYS.mockData, seeded);
        state.userId = previousUserId;
        state.displayName = previousDisplayName;
      }

      async function mockApi(action, payload) {
        const now = new Date().toISOString();

        if (action === "health") {
          return { status: "ok", service: "browserStorage", version: "production", timestamp: now };
        }

        if (action === "initDatabase") {
          persistMockData();
          return { initialized: true, sheets: ["Users", "Subjects", "Tasks", "Expenses", "Budgets", "StudyLogs", "GradeRecords", "Settings"], defaultUserId: state.userId, timestamp: now };
        }

        if (action === "requestRegisterVerification") {
          const currentAccount = getMockAuthAccount();
          const email = String(payload.email || "").trim().toLowerCase();
          const password = String(payload.password || "");
          const displayName = String(payload.displayName || "Sinh viên").trim() || "Sinh viên";

          if (!email) {
            throw new Error("Email không được để trống.");
          }

          if (password.length < 6) {
            throw new Error("Mật khẩu phải có ít nhất 6 ký tự.");
          }

          if (currentAccount && String(currentAccount.email || "").toLowerCase() === email) {
            throw new Error("Email đã được sử dụng.");
          }

          saveLocal("student_mvp_mock_register_code", { email, code: "123456", displayName, password, createdAt: now });
          return { sent: true, email, expiresInMinutes: 15, devCode: "123456" };
        }

        if (action === "requestPasswordReset") {
          const account = getMockAuthAccount();
          const email = String(payload.email || "").trim().toLowerCase();

          if (!account || String(account.email || "").toLowerCase() !== email) {
            throw new Error("Không tìm thấy tài khoản với email này.");
          }

          saveLocal("student_mvp_mock_reset_code", { email, code: "123456", createdAt: now });
          return { sent: true, email, expiresInMinutes: 15, devCode: "123456" };
        }

        if (action === "resetPassword") {
          const account = getMockAuthAccount();
          const email = String(payload.email || "").trim().toLowerCase();
          const code = String(payload.code || "").trim();
          const newPassword = String(payload.newPassword || "");
          const reset = loadLocal("student_mvp_mock_reset_code", null);

          if (!account || String(account.email || "").toLowerCase() !== email) {
            throw new Error("Không tìm thấy tài khoản với email này.");
          }

          if (!reset || String(reset.email || "") !== email || String(reset.code || "") !== code) {
            throw new Error("Mã đặt lại mật khẩu không đúng hoặc đã hết hạn.");
          }

          if (newPassword.length < 6) {
            throw new Error("Mật khẩu mới phải có ít nhất 6 ký tự.");
          }

          account.password = newPassword;
          account.updatedAt = now;
          saveMockAuthAccount(account);
          removeLocal("student_mvp_mock_reset_code");
          return { reset: true, email };
        }

        if (action === "register") {
          const currentAccount = getMockAuthAccount();
          const email = String(payload.email || "").trim().toLowerCase();
          const displayName = String(payload.displayName || "Sinh viên").trim() || "Sinh viên";
          const customerName = String(payload.customerName || displayName || "Không gian dữ liệu").trim() || "Không gian dữ liệu";
          const verificationCode = String(payload.verificationCode || "").trim();
          const registerCode = loadLocal("student_mvp_mock_register_code", null);

          if (!email) {
            throw new Error("Email không được để trống.");
          }

          if (!verificationCode) {
            throw new Error("Vui lòng nhập mã xác thực.");
          }

          if (currentAccount && String(currentAccount.email || "").toLowerCase() === email) {
            throw new Error("Email đã được sử dụng.");
          }

          if (!registerCode || String(registerCode.email || "") !== email || String(registerCode.code || "") !== verificationCode) {
            throw new Error("Mã xác thực không đúng hoặc đã hết hạn.");
          }

          if (currentAccount) {
            throw new Error("Trình duyệt hiện đã có một tài khoản lưu tạm. Hãy dùng tài khoản đã tạo hoặc xoá dữ liệu trình duyệt để tạo tài khoản mới.");
          }

          const account = {
            userId: generateLocalUserId(),
            customerId: localId("cus"),
            customerSlug: String(customerName || "local").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "local",
            customerName: customerName,
            email: email,
            password: String(registerCode.password || ""),
            displayName: displayName,
            sessionToken: "mock_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 10),
            expiresAt: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
            lastLoginAt: now,
            createdAt: now,
            updatedAt: now
          };

          saveMockAuthAccount(account);
          removeLocal("student_mvp_mock_register_code");
          ensureMockSeedDataForUser(account);
          return buildMockAuthResponse(account);
        }

        if (action === "login") {
          const account = getMockAuthAccount();
          const email = String(payload.email || "").trim().toLowerCase();
          const password = String(payload.password || "");

          if (!account || String(account.email || "").toLowerCase() !== email || String(account.password || "") !== password) {
            throw new Error("Email hoặc mật khẩu không đúng.");
          }

          account.sessionToken = "mock_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
          account.expiresAt = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
          account.lastLoginAt = now;
          account.updatedAt = now;
          saveMockAuthAccount(account);
          ensureMockSeedDataForUser(account);
          return buildMockAuthResponse(account);
        }

        if (action === "me") {
          return buildMockAuthResponse(requireMockSession(payload));
        }

        if (action === "refreshSession") {
          const account = requireMockSession(payload);
          account.expiresAt = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
          account.updatedAt = now;
          saveMockAuthAccount(account);
          return buildMockAuthResponse(account);
        }

        if (action === "logout") {
          const account = requireMockSession(payload);
          account.sessionToken = "";
          account.updatedAt = now;
          saveMockAuthAccount(account);
          return { loggedOut: true, revokedAt: now };
        }

        if (action === "changePassword") {
          const account = requireMockSession(payload);
          const currentPassword = String(payload.currentPassword || "");
          const newPassword = String(payload.newPassword || "");

          if (String(account.password || "") !== currentPassword) {
            throw new Error("Mật khẩu hiện tại không đúng.");
          }

          if (newPassword.length < 6) {
            throw new Error("Mật khẩu mới phải có ít nhất 6 ký tự.");
          }

          account.password = newPassword;
          account.updatedAt = now;
          saveMockAuthAccount(account);
          return Object.assign({ changed: true }, buildMockAuthResponse(account));
        }

        if (action !== "health" && action !== "initDatabase") {
          const account = requireMockSession(payload);
          state.userId = String(account.userId || state.userId || "");
          state.displayName = String(account.displayName || state.displayName || "Sinh viên");
        }

        if (action === "loadInitialData") {
          const expenseMonth = String(payload.expenseMonth || currentMonth());
          const statsMonth = String(payload.statsMonth || currentMonth());
          const budgetStatus = computeBudgetStatus(findBudget(expenseMonth), filterExpenses(state.expenses, { userId: state.userId, month: expenseMonth }));
          const authResponse = buildMockAuthResponse(getMockAuthAccount());

          return {
            user: authResponse.user,
            customer: authResponse.customer,
            settings: state.settings,
            subjects: state.subjects,
            tasks: state.tasks,
            expenses: state.expenses,
            budgets: state.budgets,
            studyLogs: state.studyLogs,
            gradeRecords: state.gradeRecords,
            budget: {
              budget: budgetStatus.budget,
              spentAmount: budgetStatus.spentAmount,
              remainingAmount: budgetStatus.remainingAmount,
              usagePercent: budgetStatus.usagePercent,
              currency: "VND"
            },
            dashboard: computeDashboard(payload.month || currentMonth()),
            expenseSummary: computeExpenseSummary({ month: statsMonth }),
            studySummary: computeStudySummary({ month: statsMonth }),
            gpaSummary: computeGpaSummary({
              mode: String(payload.gpaMode || state.gpaFilter.mode || "semester"),
              semester: String(payload.gpaSemester || state.gpaFilter.semester || "HK1"),
              academicYear: String(payload.gpaAcademicYear || state.gpaFilter.academicYear || currentAcademicYear())
            })
          };
        }

        if (action === "getSettings") {
          return normalizeSettingsPayload(state.settings);
        }

        if (action === "getReminderSettings") {
          return {
            reminderEmail: String(state.settings.reminderEmail || ""),
            emailReminderEnabled: Boolean(state.settings.emailReminderEnabled),
            reminderOffsets: normalizeReminderOffsets(state.settings.reminderOffsets),
            appUrl: String(state.settings.appUrl || "")
          };
        }

        if (action === "updateSettings") {
          state.settings = normalizeSettingsPayload(Object.assign({}, state.settings, payload.settings || payload, { userId: state.userId, updatedAt: now }));
          state.displayName = state.settings.displayName || state.displayName;
          state.theme = state.settings.theme || state.theme;
          persistMockData();
          return state.settings;
        }

        if (action === "updateReminderSettings") {
          state.settings = normalizeSettingsPayload(Object.assign({}, state.settings, payload || {}, { userId: state.userId, updatedAt: now }));
          persistMockData();
          return {
            reminderEmail: String(state.settings.reminderEmail || ""),
            emailReminderEnabled: Boolean(state.settings.emailReminderEnabled),
            reminderOffsets: normalizeReminderOffsets(state.settings.reminderOffsets),
            appUrl: String(state.settings.appUrl || "")
          };
        }

        if (action === "createDeadlineReminderTrigger") {
          return { created: false, existing: false, mock: true };
        }

        if (action === "deleteDeadlineReminderTrigger") {
          return { deleted: 0, mock: true };
        }

        if (action === "sendDeadlineRemindersNowForTest") {
          return {
            checkedCustomers: 1,
            checkedTasks: state.tasks.filter((task) => isTaskOpen(task)).length,
            sent: state.settings.emailReminderEnabled && state.settings.reminderEmail ? 1 : 0,
            skipped: 0,
            errors: 0,
            timestamp: now,
            mock: true
          };
        }

        if (action === "listSubjects") {
          const userId = String(payload.userId || state.userId);
          return {
            items: state.subjects
              .filter((subject) => String(subject.userId || "") === userId)
              .slice()
              .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")))
          };
        }

        if (action === "createSubject") {
          const userId = String(payload.userId || state.userId);
          const name = String(payload.name || "").trim();

          if (!name) {
            throw new Error("Tên môn học không được để trống.");
          }

          const subject = {
            id: localId("sub"),
            userId: userId,
            name: name,
            teacher: String(payload.teacher || "").trim(),
            room: String(payload.room || "").trim(),
            color: normalizeSubjectColor(payload.color),
            semester: String(payload.semester || "").trim(),
            credit: Math.max(0, Number(payload.credit || 0) || 0),
            note: String(payload.note || "").trim(),
            createdAt: now,
            updatedAt: now
          };
          state.subjects.push(subject);
          persistMockData();
          return subject;
        }

        if (action === "updateSubject") {
          const userId = String(payload.userId || state.userId);
          const current = findById(state.subjects, payload.id);

          if (!current) {
            throw new Error("Không tìm thấy môn học.");
          }

          if (String(current.userId || "") !== userId) {
            throw new Error("Bạn không có quyền thao tác môn học này.");
          }

          const nextName = Object.prototype.hasOwnProperty.call(payload, "name") ? String(payload.name || "").trim() : String(current.name || "").trim();

          if (!nextName) {
            throw new Error("Tên môn học không được để trống.");
          }

          const subject = updateLocalItem(state.subjects, payload.id, {
            name: nextName,
            teacher: Object.prototype.hasOwnProperty.call(payload, "teacher") ? String(payload.teacher || "").trim() : String(current.teacher || ""),
            room: Object.prototype.hasOwnProperty.call(payload, "room") ? String(payload.room || "").trim() : String(current.room || ""),
            color: Object.prototype.hasOwnProperty.call(payload, "color") ? normalizeSubjectColor(payload.color) : normalizeSubjectColor(current.color),
            semester: Object.prototype.hasOwnProperty.call(payload, "semester") ? String(payload.semester || "").trim() : String(current.semester || ""),
            credit: Object.prototype.hasOwnProperty.call(payload, "credit") ? Math.max(0, Number(payload.credit || 0) || 0) : Number(current.credit || 0),
            note: Object.prototype.hasOwnProperty.call(payload, "note") ? String(payload.note || "").trim() : String(current.note || ""),
            updatedAt: now
          });
          persistMockData();
          return subject;
        }

        if (action === "deleteSubject") {
          const userId = String(payload.userId || state.userId);
          const current = findById(state.subjects, payload.id);

          if (!current) {
            throw new Error("Không tìm thấy môn học.");
          }

          if (String(current.userId || "") !== userId) {
            throw new Error("Bạn không có quyền thao tác môn học này.");
          }

          const taskCount = state.tasks.filter((item) => String(item.userId || "") === userId && String(item.subjectId || "") === String(payload.id)).length;
          const studyLogCount = state.studyLogs.filter((item) => String(item.userId || "") === userId && String(item.subjectId || "") === String(payload.id)).length;
          const gradeRecordCount = state.gradeRecords.filter((item) => String(item.userId || "") === userId && String(item.subjectId || "") === String(payload.id)).length;

          if (taskCount > 0 || studyLogCount > 0 || gradeRecordCount > 0) {
            throw new Error(buildSubjectDeleteBlockedMessage(taskCount, studyLogCount, gradeRecordCount));
          }

          state.subjects = state.subjects.filter((item) => item.id !== payload.id);
          persistMockData();
          return { id: payload.id, deleted: true };
        }

        if (action === "listTasks") {
          const userId = String(payload.userId || state.userId);
          const items = state.tasks
            .filter((task) => String(task.userId || "") === userId)
            .map(normalizeTaskRecord)
            .filter((task) => {
              if (payload.status && normalizeTaskStatus(payload.status) !== task.status) {
                return false;
              }

              if (payload.type && normalizeTaskType(payload.type) !== task.type) {
                return false;
              }

              if (payload.priority && normalizeTaskPriority(payload.priority) !== task.priority) {
                return false;
              }

              if (payload.subjectId && String(task.subjectId || "") !== String(payload.subjectId)) {
                return false;
              }

              if (payload.dueFrom && String(task.dueDate || "") < String(payload.dueFrom)) {
                return false;
              }

              if (payload.dueTo && String(task.dueDate || "") > String(payload.dueTo)) {
                return false;
              }

              if (payload.keyword) {
                const keyword = String(payload.keyword || "").toLowerCase().trim();
                if (keyword && !`${task.title || ""} ${task.description || ""}`.toLowerCase().includes(keyword)) {
                  return false;
                }
              }

              return true;
            })
            .sort(sortByDueDate);

          return { items: items };
        }

        if (action === "createTask") {
          const userId = String(payload.userId || state.userId);
          const title = String(payload.title || "").trim();

          if (!title) {
            throw new Error("Tiêu đề công việc không được để trống.");
          }

          if (payload.subjectId) {
            assertOwnedLocalSubject(payload.subjectId);
          }

          const task = normalizeTaskRecord({
            id: localId("task"),
            userId: userId,
            title: title,
            description: String(payload.description || "").trim(),
            subjectId: String(payload.subjectId || ""),
            type: Object.prototype.hasOwnProperty.call(payload, "type") ? payload.type : "assignment",
            priority: Object.prototype.hasOwnProperty.call(payload, "priority") ? payload.priority : "medium",
            status: Object.prototype.hasOwnProperty.call(payload, "status") ? payload.status : "todo",
            dueDate: String(payload.dueDate || ""),
            dueTime: String(payload.dueTime || ""),
            estimatedMinutes: Math.max(0, Number(payload.estimatedMinutes || 0) || 0),
            completedAt: "",
            createdAt: now,
            updatedAt: now
          });

          if (task.status === "done") {
            task.completedAt = now;
          }

          state.tasks.push(task);
          persistMockData();
          return task;
        }

        if (action === "updateTask") {
          const userId = String(payload.userId || state.userId);
          const current = findById(state.tasks, payload.id);

          if (!current) {
            throw new Error("Không tìm thấy công việc.");
          }

          if (String(current.userId || "") !== userId) {
            throw new Error("Bạn không có quyền thao tác công việc này.");
          }

          const nextTitle = Object.prototype.hasOwnProperty.call(payload, "title") ? String(payload.title || "").trim() : String(current.title || "").trim();

          if (!nextTitle) {
            throw new Error("Tiêu đề công việc không được để trống.");
          }

          if (Object.prototype.hasOwnProperty.call(payload, "subjectId") && String(payload.subjectId || "")) {
            assertOwnedLocalSubject(payload.subjectId);
          }

          const nextStatus = Object.prototype.hasOwnProperty.call(payload, "status") ? normalizeTaskStatus(payload.status) : normalizeTaskStatus(current.status);
          const task = updateLocalItem(state.tasks, payload.id, normalizeTaskRecord({
            id: current.id,
            userId: current.userId,
            title: nextTitle,
            description: Object.prototype.hasOwnProperty.call(payload, "description") ? String(payload.description || "").trim() : String(current.description || ""),
            subjectId: Object.prototype.hasOwnProperty.call(payload, "subjectId") ? String(payload.subjectId || "") : String(current.subjectId || ""),
            type: Object.prototype.hasOwnProperty.call(payload, "type") ? payload.type : current.type,
            priority: Object.prototype.hasOwnProperty.call(payload, "priority") ? payload.priority : current.priority,
            status: nextStatus,
            dueDate: Object.prototype.hasOwnProperty.call(payload, "dueDate") ? String(payload.dueDate || "") : String(current.dueDate || ""),
            dueTime: Object.prototype.hasOwnProperty.call(payload, "dueTime") ? String(payload.dueTime || "") : String(current.dueTime || ""),
            estimatedMinutes: Object.prototype.hasOwnProperty.call(payload, "estimatedMinutes") ? Math.max(0, Number(payload.estimatedMinutes || 0) || 0) : Number(current.estimatedMinutes || 0),
            completedAt: nextStatus === "done"
              ? (Object.prototype.hasOwnProperty.call(payload, "completedAt") ? String(payload.completedAt || "") : String(current.completedAt || now)) || now
              : "",
            createdAt: current.createdAt,
            updatedAt: now
          }));
          persistMockData();
          return task;
        }

        if (action === "completeTask") {
          const userId = String(payload.userId || state.userId);
          const current = findById(state.tasks, payload.id);

          if (!current) {
            throw new Error("Không tìm thấy công việc.");
          }

          if (String(current.userId || "") !== userId) {
            throw new Error("Bạn không có quyền thao tác công việc này.");
          }

          const task = updateLocalItem(state.tasks, payload.id, normalizeTaskRecord(Object.assign({}, current, {
            status: "done",
            completedAt: now,
            updatedAt: now
          })));
          persistMockData();
          return task;
        }

        if (action === "deleteTask") {
          const userId = String(payload.userId || state.userId);
          const current = findById(state.tasks, payload.id);

          if (!current) {
            throw new Error("Không tìm thấy công việc.");
          }

          if (String(current.userId || "") !== userId) {
            throw new Error("Bạn không có quyền thao tác công việc này.");
          }

          state.tasks = state.tasks.filter((item) => item.id !== payload.id);
          persistMockData();
          return { id: payload.id, deleted: true };
        }

        if (action === "listExpenses") {
          const userId = String(payload.userId || state.userId);
          const items = filterExpenses(state.expenses, Object.assign({}, payload, { userId: userId }))
            .slice()
            .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
          return { items: items, totalAmount: sum(items, "amount"), currency: "VND" };
        }

        if (action === "createExpense") {
          const date = String(payload.date || "").trim();
          const amount = Number(payload.amount || 0);
          const category = String(payload.category || "").trim();

          if (!date) {
            throw new Error("date không được để trống.");
          }

          if (amount <= 0) {
            throw new Error("amount phải lớn hơn 0.");
          }

          if (!category) {
            throw new Error("category không được để trống.");
          }

          const expense = {
            id: localId("exp"),
            userId: state.userId,
            date: date,
            amount: amount,
            category: category,
            paymentMethod: String(payload.paymentMethod || "cash").trim() || "cash",
            note: String(payload.note || "").trim(),
            createdAt: now,
            updatedAt: now
          };
          state.expenses.push(expense);
          persistMockData();
          return expense;
        }

        if (action === "updateExpense") {
          const expense = assertOwnedLocalExpense(payload.id);

          const updates = { updatedAt: now };

          if (Object.prototype.hasOwnProperty.call(payload, "date")) {
            updates.date = String(payload.date || "").trim();

            if (!updates.date) {
              throw new Error("date không được để trống.");
            }
          }

          if (payload.amount !== undefined && Number(payload.amount || 0) <= 0) {
            throw new Error("amount phải lớn hơn 0.");
          }

          if (payload.amount !== undefined) {
            updates.amount = Number(payload.amount || 0);
          }

          if (Object.prototype.hasOwnProperty.call(payload, "category")) {
            updates.category = String(payload.category || "").trim();

            if (!updates.category) {
              throw new Error("category không được để trống.");
            }
          }

          if (Object.prototype.hasOwnProperty.call(payload, "paymentMethod")) {
            updates.paymentMethod = String(payload.paymentMethod || "").trim() || String(expense.paymentMethod || "cash");
          }

          if (Object.prototype.hasOwnProperty.call(payload, "note")) {
            updates.note = String(payload.note || "").trim();
          }

          const savedExpense = updateLocalItem(state.expenses, payload.id, updates);
          persistMockData();
          return savedExpense;
        }

        if (action === "deleteExpense") {
          assertOwnedLocalExpense(payload.id);
          state.expenses = state.expenses.filter((item) => item.id !== payload.id);
          persistMockData();
          return { id: payload.id, deleted: true };
        }

        if (action === "getBudget") {
          const budget = findBudget(payload.month || currentMonth());
          const expenses = filterExpenses(state.expenses, { userId: state.userId, month: payload.month || currentMonth() });
          const budgetStatus = computeBudgetStatus(budget, expenses);
          return { budget: budgetStatus.budget, spentAmount: budgetStatus.spentAmount, remainingAmount: budgetStatus.remainingAmount, usagePercent: budgetStatus.usagePercent, currency: "VND" };
        }

        if (action === "upsertBudget") {
          const month = String(payload.month || "").trim();

          if (!month) {
            throw new Error("Thiếu trường bắt buộc: month");
          }

          const existingIndex = state.budgets.findIndex((item) => String(item.userId || "") === String(state.userId) && String(item.month || "") === month);
          const currentBudget = existingIndex >= 0
            ? Object.assign(buildDefaultBudget(month), state.budgets[existingIndex])
            : buildDefaultBudget(month);
          const budget = Object.assign({}, currentBudget, {
            id: existingIndex >= 0 ? currentBudget.id : localId("bud"),
            userId: state.userId,
            month: month,
            createdAt: existingIndex >= 0 ? currentBudget.createdAt : now,
            updatedAt: now
          });

          BUDGET_INPUT_FIELDS.forEach(([fieldName]) => {
            if (Object.prototype.hasOwnProperty.call(payload, fieldName)) {
              const value = Number(payload[fieldName] || 0);

              if (!Number.isFinite(value) || value < 0) {
                throw new Error(fieldName + " không được nhỏ hơn 0.");
              }

              budget[fieldName] = value;
            }
          });

          if (existingIndex >= 0) {
            state.budgets[existingIndex] = budget;
          } else {
            state.budgets.push(budget);
          }
          persistMockData();
          return { budget: budget, saved: true };
        }

        if (action === "listStudyLogs") {
          const items = filterStudyLogs(state.studyLogs, Object.assign({}, payload, { userId: state.userId }))
            .slice()
            .sort(sortStudyLogsNewest);
          return { items: items, totalMinutes: sum(items, "minutes") };
        }

        if (action === "createStudyLog") {
          const date = String(payload.date || "").trim();
          const minutes = Number(payload.minutes || 0);
          const subjectId = String(payload.subjectId || "").trim();
          const taskId = String(payload.taskId || "").trim();

          if (!date) {
            throw new Error("date không được để trống.");
          }

          if (minutes <= 0) {
            throw new Error("minutes phải lớn hơn 0.");
          }

          if (subjectId) {
            assertOwnedLocalSubject(subjectId);
          }

          if (taskId) {
            assertOwnedLocalTask(taskId);
          }

          const log = {
            id: localId("log"),
            userId: state.userId,
            subjectId: subjectId,
            taskId: taskId,
            date: date,
            minutes: minutes,
            note: String(payload.note || "").trim(),
            createdAt: now
          };
          state.studyLogs.push(log);
          persistMockData();
          return log;
        }

        if (action === "deleteStudyLog") {
          assertOwnedLocalStudyLog(payload.id);
          state.studyLogs = state.studyLogs.filter((item) => item.id !== payload.id);
          persistMockData();
          return { id: payload.id, deleted: true };
        }

        if (action === "listGradeRecords") {
          const items = filterGradeRecords(state.gradeRecords, Object.assign({}, payload, { userId: state.userId }))
            .slice()
            .sort(sortGradeRecords);
          return { items: items };
        }

        if (action === "createGradeRecord") {
          const record = normalizeGradeRecord(Object.assign(buildGradeRecordPayload(payload), {
            id: localId("grd"),
            userId: state.userId,
            createdAt: now,
            updatedAt: now
          }));
          state.gradeRecords.push(record);
          state.gradeRecords.sort(sortGradeRecords);
          persistMockData();
          return record;
        }

        if (action === "updateGradeRecord") {
          const current = assertOwnedLocalGradeRecord(payload.id);
          const record = normalizeGradeRecord(Object.assign({}, current, buildGradeRecordPayload(Object.assign({}, current, payload)), {
            id: current.id,
            userId: current.userId,
            createdAt: current.createdAt,
            updatedAt: now
          }));
          const savedRecord = updateLocalItem(state.gradeRecords, payload.id, record);
          state.gradeRecords.sort(sortGradeRecords);
          persistMockData();
          return savedRecord;
        }

        if (action === "deleteGradeRecord") {
          assertOwnedLocalGradeRecord(payload.id);
          state.gradeRecords = state.gradeRecords.filter((item) => item.id !== payload.id);
          persistMockData();
          return { id: payload.id, deleted: true };
        }

        if (action === "getGpaSummary") {
          return computeGpaSummary(payload || {});
        }

        if (action === "getDashboard") {
          return computeDashboard(payload.month);
        }

        if (action === "getExpenseSummary") {
          return computeExpenseSummary(payload);
        }

        if (action === "getStudySummary") {
          return computeStudySummary(payload);
        }

        throw new Error("Thao tác chưa được hỗ trợ trên trình duyệt: " + action);
      }

      /* ===== Data computations ===== */
      function computeDashboard(month) {
        const selectedMonth = month || currentMonth();
        const activeTasks = state.tasks.filter((task) => isTaskOpen(task));
        const expenses = filterExpenses(state.expenses, { month: selectedMonth });
        const budget = findBudget(selectedMonth);
        const expenseTotal = sum(expenses, "amount");
        const weekStart = startOfWeek(today());
        const weeklyStudyMinutes = state.studyLogs
          .filter((log) => log.date >= weekStart && log.date <= today())
          .reduce((total, log) => total + Number(log.minutes || 0), 0);

        return {
          todayTaskCount: activeTasks.filter((task) => task.dueDate === today()).length,
          overdueTaskCount: activeTasks.filter((task) => isTaskOverdue(task)).length,
          upcomingTasks: activeTasks.filter((task) => task.dueDate && task.dueDate >= today()).sort(sortByDueDate).slice(0, 5),
          monthlyExpenseTotal: expenseTotal,
          monthlyBudget: Number(budget.totalBudget || state.settings.monthlyBudget || 0),
          remainingBudget: Number(budget.totalBudget || state.settings.monthlyBudget || 0) - expenseTotal,
          weeklyStudyMinutes: weeklyStudyMinutes,
          expenseByCategory: groupSum(expenses, "category", "amount")
        };
      }

      function computeExpenseSummary(payload) {
        const expenses = filterExpenses(state.expenses, payload || {});
        const total = sum(expenses, "amount");
        const byDate = groupSum(expenses, "date", "amount");
        const byCategory = groupSum(expenses, "category", "amount");
        const dayCount = payload && payload.month ? daysInMonth(payload.month) : Math.max(Object.keys(byDate).length, 1);

        return {
          total: total,
          averagePerDay: dayCount ? Math.round(total / dayCount) : 0,
          byCategory: byCategory,
          byDate: byDate,
          topCategory: topKey(byCategory),
          currency: "VND"
        };
      }

      function computeBudgetStatus(budget, expenses) {
        const activeMonth = (budget && budget.month) || state.expenseMonth || currentMonth();
        const normalizedBudget = Object.assign(buildDefaultBudget(activeMonth), budget || {});

        BUDGET_INPUT_FIELDS.forEach(([fieldName]) => {
          normalizedBudget[fieldName] = Math.max(0, Number(normalizedBudget[fieldName] || 0) || 0);
        });

        const spentAmount = sum(expenses || [], "amount");
        const totalBudget = Number(normalizedBudget.totalBudget || 0);

        return {
          budget: normalizedBudget,
          totalBudget: totalBudget,
          spentAmount: spentAmount,
          remainingAmount: totalBudget - spentAmount,
          usagePercent: totalBudget > 0 ? Math.round((spentAmount / totalBudget) * 100) : 0
        };
      }

      function computeStudySummary(payload) {
        const logs = filterStudyLogs(state.studyLogs, payload || {});
        const weekStart = startOfWeek(today());
        const bySubject = groupSum(logs, "subjectId", "minutes");

        return {
          totalMinutes: sum(logs, "minutes"),
          bySubject: bySubject,
          byDate: groupSum(logs, "date", "minutes"),
          thisWeekMinutes: sum(state.studyLogs.filter((log) => log.date >= weekStart && log.date <= today()), "minutes"),
          thisMonthMinutes: sum(state.studyLogs.filter((log) => String(log.date || "").slice(0, 7) === currentMonth()), "minutes")
        };
      }

      function getDashboardInsights() {
        const fallback = computeDashboard(currentMonth());
        const dashboard = Object.assign({}, fallback, state.dashboard || {});
        const activeTasks = state.tasks.map((task) => normalizeTaskRecord(task)).filter((task) => isTaskOpen(task));
        const upcomingTasks = Array.isArray(dashboard.upcomingTasks) && dashboard.upcomingTasks.length
          ? dashboard.upcomingTasks.map((task) => normalizeTaskRecord(task))
          : activeTasks.filter((task) => task.dueDate && String(task.dueDate) >= today()).sort(sortByDueDate).slice(0, 5);

        return Object.assign({}, dashboard, {
          upcomingTasks: upcomingTasks,
          deadlineSoonCount: activeTasks.filter((task) => isTaskDueSoon(task, 7)).length,
          recentExpenses: getRecentExpenses(5),
          taskStatusCounts: getTaskStatusCounts(state.tasks)
        });
      }

      function getRecentExpenses(limit) {
        return state.expenses.slice().sort(sortExpensesNewest).slice(0, limit || 5);
      }

      function getTaskMetrics(month) {
        const selectedMonth = String(month || currentMonth());
        const items = state.tasks
          .map((task) => normalizeTaskRecord(task))
          .filter((task) => taskMatchesMonth(task, selectedMonth));
        const doneCount = items.filter((task) => normalizeTaskStatus(task.status) === "done").length;
        const openCount = items.filter((task) => isTaskOpen(task)).length;
        const cancelledCount = items.filter((task) => normalizeTaskStatus(task.status) === "cancelled").length;
        const activeCount = doneCount + openCount;

        return {
          items: items,
          doneCount: doneCount,
          openCount: openCount,
          cancelledCount: cancelledCount,
          completionRate: activeCount > 0 ? Math.round((doneCount / activeCount) * 100) : 0,
          statusCounts: getTaskStatusCounts(items)
        };
      }

      function getTaskStatusCounts(tasks) {
        const items = (tasks || []).map((task) => normalizeTaskRecord(task));
        return {
          "Cần làm": items.filter((task) => normalizeTaskStatus(task.status) === "todo").length,
          "Đang làm": items.filter((task) => normalizeTaskStatus(task.status) === "doing").length,
          "Hoàn thành": items.filter((task) => normalizeTaskStatus(task.status) === "done").length,
          "Đã huỷ": items.filter((task) => normalizeTaskStatus(task.status) === "cancelled").length
        };
      }

      function getTopEntries(object, limit) {
        return Object.entries(object || {})
          .map((entry) => [entry[0], Number(entry[1] || 0)])
          .filter((entry) => Number(entry[1] || 0) > 0)
          .sort((a, b) => Number(b[1] || 0) - Number(a[1] || 0))
          .slice(0, limit || 3);
      }

      function getSortedDateEntries(object) {
        return Object.entries(object || {})
          .map((entry) => [entry[0], Number(entry[1] || 0)])
          .filter((entry) => Number(entry[1] || 0) > 0)
          .sort((a, b) => String(a[0] || "").localeCompare(String(b[0] || "")));
      }

      function taskMatchesMonth(task, month) {
        const item = normalizeTaskRecord(task);
        const dueMonth = String(item.dueDate || "").slice(0, 7);
        const completedMonth = String(item.completedAt || "").slice(0, 7);
        const createdMonth = String(item.createdAt || "").slice(0, 7);
        return dueMonth === month || completedMonth === month || createdMonth === month;
      }

      function isTaskDueSoon(task, dayCount) {
        const item = normalizeTaskRecord(task);

        if (!item.dueDate || !isTaskOpen(item) || String(item.dueDate) < today()) {
          return false;
        }

        return String(item.dueDate) <= addDays(today(), Number(dayCount || 0));
      }

      function sortExpensesNewest(a, b) {
        return String(b.date || "").localeCompare(String(a.date || ""))
          || String(b.createdAt || "").localeCompare(String(a.createdAt || ""))
          || String(b.id || "").localeCompare(String(a.id || ""));
      }

      function formatShortDate(value) {
        const parts = String(value || "").split("-");
        return parts.length >= 3 ? `${parts[2]}/${parts[1]}` : String(value || "");
      }

      function getVisibleTasks() {
        const keyword = state.taskSearch.toLowerCase().trim();
        const weekStart = startOfWeek(today());
        const weekEnd = addDays(weekStart, 6);

        return state.tasks.filter((task) => {
          const item = normalizeTaskRecord(task);

          if (keyword && !`${task.title || ""} ${task.description || ""}`.toLowerCase().includes(keyword)) {
            return false;
          }

          if (state.taskFilter === "today") {
            return item.dueDate === today() && isTaskOpen(item);
          }

          if (state.taskFilter === "week") {
            return item.dueDate >= weekStart && item.dueDate <= weekEnd && isTaskOpen(item);
          }

          if (state.taskFilter === "overdue") {
            return isTaskOverdue(item);
          }

          if (state.taskFilter === "done") {
            return item.status === "done";
          }

          if (state.taskFilter === "open") {
            return isTaskOpen(item);
          }

          return true;
        }).sort(sortVisibleTasks);
      }


      let revealObserver = null;

      function getRevealObserver() {
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          return null;
        }

        if (!("IntersectionObserver" in window)) {
          return null;
        }

        if (!revealObserver) {
          revealObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) {
                return;
              }

              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            });
          }, {
            root: null,
            threshold: 0.12,
            rootMargin: "0px 0px -8% 0px"
          });
        }

        return revealObserver;
      }

      function handleCardPointerMove(event) {
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          return;
        }

        const card = event.currentTarget;
        const rect = card.getBoundingClientRect();

        if (!rect.width || !rect.height) {
          return;
        }

        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;
        card.style.setProperty("--tilt-x", `${(-y * 4).toFixed(2)}deg`);
        card.style.setProperty("--tilt-y", `${(x * 5).toFixed(2)}deg`);
      }

      function resetCardPointer(event) {
        const card = event.currentTarget;
        card.style.setProperty("--tilt-x", "0deg");
        card.style.setProperty("--tilt-y", "0deg");
      }

      function enhanceInterfaceMotion() {
        if (!viewRoot) {
          return;
        }

        const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const observer = getRevealObserver();
        const elements = Array.from(viewRoot.querySelectorAll(".mvp-card, .item-card, .stat-card, .compact-row, .top-item, .bar-line, .empty-state"));

        elements.forEach((element, index) => {
          element.classList.add("reveal-on-scroll");

          if (!element.style.getPropertyValue("--reveal-delay")) {
            element.style.setProperty("--reveal-delay", `${Math.min((index % 8) * 55, 385)}ms`);
          }

          if (reduceMotion || !observer) {
            element.classList.add("is-visible");
          } else {
            observer.observe(element);
          }

          if (!reduceMotion && !element.dataset.tiltReady && element.matches(".mvp-card, .item-card, .stat-card, .compact-row, .top-item")) {
            element.dataset.tiltReady = "true";
            element.classList.add("motion-3d");
            element.addEventListener("pointermove", handleCardPointerMove);
            element.addEventListener("pointerleave", resetCardPointer);
            element.addEventListener("pointercancel", resetCardPointer);
          }
        });
      }

      function buildReminderAutomationSuccessMessage(actionName, response, fallbackText) {
        if (actionName === "createDeadlineReminderTrigger" && response && response.existing) {
          return "Nhắc deadline hằng ngày đã được bật từ trước.";
        }

        if (actionName === "deleteDeadlineReminderTrigger" && response && typeof response.deleted !== "undefined") {
          return Number(response.deleted || 0) > 0
            ? `Đã tắt ${Number(response.deleted || 0)} lịch nhắc deadline.`
            : "Hiện không có lịch nhắc deadline nào đang bật.";
        }

        if (actionName === "sendDeadlineRemindersNowForTest" && response && typeof response === "object") {
          const parts = [
            `Đã kiểm tra ${Number(response.checkedTasks || 0)} deadline mở`,
            `gửi ${Number(response.sent || 0)} email`,
            `bỏ qua ${Number(response.skipped || 0)}`
          ];

          if (Number(response.errors || 0) > 0) {
            parts.push(`lỗi ${Number(response.errors || 0)}`);
          }

          return parts.join(" · ");
        }

        return fallbackText;
      }

      async function startPomodoro() {
        normalizeStudyUiState();

        const pomodoro = state.pomodoro;

        if (pomodoro.running) {
          return;
        }

        if (pomodoro.mode === "focus" && !pomodoro.activeSubjectId) {
          if (!pomodoro.subjectId) {
            throw new Error("Vui lòng chọn môn học trước khi bắt đầu Pomodoro.");
          }

          pomodoro.activeSubjectId = String(pomodoro.subjectId || "");
          pomodoro.activeTaskId = String(pomodoro.taskId || "");
        }

        pomodoro.running = true;
        pomodoro.remainingSeconds = Math.max(0, Number(pomodoro.remainingSeconds || (pomodoro.mode === "break" ? POMODORO_BREAK_SECONDS : POMODORO_FOCUS_SECONDS)) || 0);
        pomodoro.endsAt = Date.now() + Math.max(1, pomodoro.remainingSeconds) * 1000;

        stopPomodoroTicker();
        pomodoroTimerId = window.setInterval(async () => {
          updatePomodoroRemaining();
          syncPomodoroDisplay();

          if (state.pomodoro.running && state.pomodoro.remainingSeconds <= 0) {
            await completePomodoroCycle();
          }
        }, 500);

        renderApp();
      }

      function pausePomodoro() {
        if (!state.pomodoro.running) {
          return;
        }

        updatePomodoroRemaining();
        state.pomodoro.running = false;
        state.pomodoro.endsAt = 0;
        stopPomodoroTicker();
        renderApp();
      }

      function resetPomodoro() {
        stopPomodoroTicker();
        state.pomodoro = Object.assign({}, state.pomodoro, {
          mode: "focus",
          remainingSeconds: POMODORO_FOCUS_SECONDS,
          running: false,
          endsAt: 0,
          activeSubjectId: "",
          activeTaskId: ""
        });
        renderApp();
      }

      function stopPomodoroTicker() {
        if (pomodoroTimerId) {
          window.clearInterval(pomodoroTimerId);
          pomodoroTimerId = 0;
        }
      }

      function updatePomodoroRemaining() {
        if (!state.pomodoro.running || !state.pomodoro.endsAt) {
          return;
        }

        state.pomodoro.remainingSeconds = Math.max(0, Math.ceil((state.pomodoro.endsAt - Date.now()) / 1000));
      }

      function syncPomodoroDisplay() {
        const display = document.getElementById("pomodoroDisplay");
        const status = document.getElementById("pomodoroStatusText");
        const mode = document.getElementById("pomodoroModeLabel");

        if (display) {
          display.textContent = formatPomodoroTime(state.pomodoro.remainingSeconds);
        }

        if (status) {
          status.textContent = getPomodoroStatusText();
        }

        if (mode) {
          mode.textContent = state.pomodoro.mode === "focus" ? "Phiên học" : "Phiên nghỉ";
        }
      }

      async function completePomodoroCycle() {
        if (pomodoroCompletionInFlight) {
          return;
        }

        pomodoroCompletionInFlight = true;
        stopPomodoroTicker();

        const completedMode = state.pomodoro.mode;
        const completedSubjectId = String(state.pomodoro.activeSubjectId || state.pomodoro.subjectId || "");
        const completedTaskId = String(state.pomodoro.activeTaskId || state.pomodoro.taskId || "");

        state.pomodoro.running = false;
        state.pomodoro.endsAt = 0;

        try {
          if (completedMode === "focus") {
            state.pomodoro.mode = "break";
            state.pomodoro.remainingSeconds = POMODORO_BREAK_SECONDS;
            state.pomodoro.activeSubjectId = "";
            state.pomodoro.activeTaskId = "";

            if (state.currentView === "study") {
              renderApp();
            }

            const subjectName = completedSubjectId ? getSubjectName(completedSubjectId) : "môn học đã chọn";
            const shouldSave = await confirmDialog(`Bạn đã hoàn thành 25 phút học cho ${subjectName}. Bạn có muốn lưu nhật ký học không?`);

            if (shouldSave) {
              const savedLog = await api("createStudyLog", {
                subjectId: completedSubjectId,
                taskId: completedTaskId,
                date: today(),
                minutes: Math.round(POMODORO_FOCUS_SECONDS / 60),
                note: "Pomodoro 25 phút"
              });
              applyCrudResponseToState("createStudyLog", savedLog);
              showToast("Đã lưu nhật ký học 25 phút.", "success");
              renderAfterDataMutation("studyLogs");
            } else if (state.currentView === "study") {
              renderApp();
            }

            showToast("Đã chuyển sang 5 phút nghỉ.", "success");
          } else {
            state.pomodoro.mode = "focus";
            state.pomodoro.remainingSeconds = POMODORO_FOCUS_SECONDS;

            if (state.currentView === "study") {
              renderApp();
            }

            showToast("Đã hết giờ nghỉ. Sẵn sàng cho phiên học tiếp theo.", "success");
          }
        } catch (error) {
          showToast(error.message || "Không thể hoàn tất phiên Pomodoro.", "error");

          if (state.currentView === "study") {
            renderApp();
          }
        } finally {
          pomodoroCompletionInFlight = false;
        }
      }

      function getPomodoroStatusText() {
        const pomodoro = state.pomodoro;

        if (pomodoro.mode === "focus") {
          if (pomodoro.running) {
            return "Đang tập trung trong phiên học 25 phút.";
          }

          if (pomodoro.activeSubjectId && pomodoro.remainingSeconds < POMODORO_FOCUS_SECONDS) {
            return "Phiên học đang tạm dừng. Nhấn Bắt đầu để tiếp tục.";
          }

          return "Chọn môn học và nhấn Bắt đầu để vào phiên học 25 phút.";
        }

        if (pomodoro.running) {
          return "Đang trong phiên nghỉ 5 phút.";
        }

        return "Phiên nghỉ đã sẵn sàng. Bạn có thể bắt đầu bất cứ lúc nào.";
      }

      function clampNumber(value, min, max) {
        const number = Number(value);
        if (!Number.isFinite(number)) {
          return min;
        }
        return Math.min(max, Math.max(min, number));
      }

      function normalizePomodoroAudioSettings(rawSettings) {
        const raw = rawSettings || {};
        const allowedTypes = Object.create(null);
        POMODORO_SOUND_OPTIONS.forEach(([value]) => {
          allowedTypes[value] = true;
        });

        const type = allowedTypes[String(raw.type || "")] ? String(raw.type) : "white";
        return {
          enabled: raw.enabled === true,
          type: type,
          volume: clampNumber(raw.volume === undefined ? 0.35 : Number(raw.volume), 0, 1)
        };
      }

      function persistPomodoroAudioSettings() {
        state.pomodoroAudio = normalizePomodoroAudioSettings(state.pomodoroAudio);
        saveLocal(STORAGE_KEYS.pomodoroAudio, state.pomodoroAudio);
      }

      function getPomodoroSoundLabel(type) {
        const item = POMODORO_SOUND_OPTIONS.find(([value]) => value === type);
        return item ? item[1] : "Âm trắng cổ điển";
      }

      function ensurePomodoroAudioEngine() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          throw new Error("Trình duyệt hiện tại chưa hỗ trợ Web Audio.");
        }

        if (!pomodoroAudioEngine || !pomodoroAudioEngine.context || pomodoroAudioEngine.context.state === "closed") {
          const context = new AudioContextClass();
          const masterGain = context.createGain();
          masterGain.gain.value = 0;
          masterGain.connect(context.destination);
          pomodoroAudioEngine = {
            context: context,
            masterGain: masterGain,
            nodes: [],
            timers: []
          };
        }

        return pomodoroAudioEngine;
      }

      function addPomodoroAudioNode(node) {
        if (!pomodoroAudioEngine) {
          return node;
        }
        pomodoroAudioEngine.nodes.push(node);
        return node;
      }

      function stopPomodoroAudioNodes() {
        if (!pomodoroAudioEngine) {
          return;
        }

        pomodoroAudioEngine.timers.forEach((timerId) => window.clearInterval(timerId));
        pomodoroAudioEngine.timers = [];
        pomodoroAudioEngine.nodes.forEach((node) => {
          try {
            if (typeof node.stop === "function") {
              node.stop(0);
            }
          } catch (error) {}

          try {
            if (typeof node.disconnect === "function") {
              node.disconnect();
            }
          } catch (error) {}
        });
        pomodoroAudioEngine.nodes = [];
      }

      function createNoiseBuffer(context, type) {
        const durationSeconds = type === "cafe" ? 4 : 3;
        const frameCount = Math.max(1, Math.floor(context.sampleRate * durationSeconds));
        const buffer = context.createBuffer(1, frameCount, context.sampleRate);
        const data = buffer.getChannelData(0);
        let previousPink0 = 0;
        let previousPink1 = 0;
        let previousBrown = 0;

        for (let i = 0; i < frameCount; i += 1) {
          const white = Math.random() * 2 - 1;

          if (type === "pink") {
            previousPink0 = 0.99765 * previousPink0 + white * 0.0990460;
            previousPink1 = 0.96300 * previousPink1 + white * 0.2965164;
            data[i] = clampNumber((previousPink0 + previousPink1 + white * 0.05) * 0.36, -1, 1);
          } else if (type === "brown" || type === "ocean") {
            previousBrown = (previousBrown + 0.02 * white) / 1.02;
            data[i] = clampNumber(previousBrown * 3.4, -1, 1);
          } else if (type === "rain") {
            const crackle = Math.random() > 0.985 ? (Math.random() * 2 - 1) * 0.9 : 0;
            data[i] = clampNumber(white * 0.34 + crackle, -1, 1);
          } else if (type === "cafe") {
            const murmur = Math.sin(i / 97) * 0.06 + Math.sin(i / 173) * 0.04;
            const clink = Math.random() > 0.997 ? (Math.random() * 2 - 1) * 0.65 : 0;
            data[i] = clampNumber(white * 0.13 + murmur + clink, -1, 1);
          } else {
            data[i] = white * 0.42;
          }
        }

        return buffer;
      }

      function createNoiseAudio(type) {
        const engine = ensurePomodoroAudioEngine();
        const context = engine.context;
        const source = context.createBufferSource();
        source.buffer = createNoiseBuffer(context, type);
        source.loop = true;

        let outputNode = source;
        const gain = context.createGain();
        gain.gain.value = type === "cafe" ? 0.76 : 1;

        if (type === "rain") {
          const highPass = context.createBiquadFilter();
          highPass.type = "highpass";
          highPass.frequency.value = 650;
          source.connect(highPass);
          highPass.connect(gain);
          addPomodoroAudioNode(highPass);
        } else if (type === "ocean") {
          const lowPass = context.createBiquadFilter();
          lowPass.type = "lowpass";
          lowPass.frequency.value = 520;
          const waveGain = context.createGain();
          waveGain.gain.value = 0.9;
          source.connect(lowPass);
          lowPass.connect(waveGain);
          waveGain.connect(gain);
          addPomodoroAudioNode(lowPass);
          addPomodoroAudioNode(waveGain);
        } else if (type === "cafe") {
          const bandPass = context.createBiquadFilter();
          bandPass.type = "bandpass";
          bandPass.frequency.value = 880;
          bandPass.Q.value = 0.7;
          source.connect(bandPass);
          bandPass.connect(gain);
          addPomodoroAudioNode(bandPass);
        } else {
          outputNode.connect(gain);
        }

        gain.connect(engine.masterGain);
        addPomodoroAudioNode(source);
        addPomodoroAudioNode(gain);
        source.start(0);
      }

      function createLofiAudio() {
        const engine = ensurePomodoroAudioEngine();
        const context = engine.context;
        const master = context.createGain();
        const filter = context.createBiquadFilter();
        const chords = [
          [261.63, 329.63, 392.0],
          [220.0, 277.18, 329.63],
          [246.94, 311.13, 369.99],
          [196.0, 246.94, 293.66]
        ];
        const oscillators = [];
        let chordIndex = 0;

        master.gain.value = 0.34;
        filter.type = "lowpass";
        filter.frequency.value = 1050;
        filter.Q.value = 0.6;
        master.connect(filter);
        filter.connect(engine.masterGain);
        addPomodoroAudioNode(master);
        addPomodoroAudioNode(filter);

        chords[0].forEach((frequency, index) => {
          const oscillator = context.createOscillator();
          const voiceGain = context.createGain();
          oscillator.type = index === 0 ? "sine" : "triangle";
          oscillator.frequency.value = frequency;
          oscillator.detune.value = index === 0 ? -5 : index * 4;
          voiceGain.gain.value = index === 0 ? 0.22 : 0.14;
          oscillator.connect(voiceGain);
          voiceGain.connect(master);
          oscillator.start(0);
          oscillators.push(oscillator);
          addPomodoroAudioNode(oscillator);
          addPomodoroAudioNode(voiceGain);
        });

        const timerId = window.setInterval(() => {
          chordIndex = (chordIndex + 1) % chords.length;
          const now = context.currentTime;
          chords[chordIndex].forEach((frequency, index) => {
            if (oscillators[index]) {
              oscillators[index].frequency.setTargetAtTime(frequency, now, 0.45);
            }
          });
        }, 5200);
        engine.timers.push(timerId);
      }

      async function startPomodoroAudio() {
        state.pomodoroAudio = normalizePomodoroAudioSettings(state.pomodoroAudio);

        if (!state.pomodoroAudio.enabled) {
          stopPomodoroAudioNodes();
          return;
        }

        const engine = ensurePomodoroAudioEngine();
        const context = engine.context;
        if (context.state === "suspended") {
          await context.resume();
        }

        stopPomodoroAudioNodes();
        engine.masterGain.gain.setTargetAtTime(state.pomodoroAudio.volume, context.currentTime, 0.03);

        if (state.pomodoroAudio.type === "lofi") {
          createLofiAudio();
        } else {
          createNoiseAudio(state.pomodoroAudio.type);
        }
      }

      async function restartPomodoroAudio() {
        if (!state.pomodoroAudio || !state.pomodoroAudio.enabled) {
          return;
        }
        await startPomodoroAudio();
      }

      function updatePomodoroAudioVolume() {
        if (!pomodoroAudioEngine || !pomodoroAudioEngine.masterGain) {
          return;
        }
        const context = pomodoroAudioEngine.context;
        const volume = normalizePomodoroAudioSettings(state.pomodoroAudio).volume;
        pomodoroAudioEngine.masterGain.gain.setTargetAtTime(volume, context.currentTime, 0.03);
      }

      function stopPomodoroAudio(options) {
        const settings = Object.assign({ keepEnabled: true }, options || {});
        stopPomodoroAudioNodes();
        if (!settings.keepEnabled && state && state.pomodoroAudio) {
          state.pomodoroAudio.enabled = false;
          persistPomodoroAudioSettings();
        }
      }

      async function togglePomodoroAudio() {
        state.pomodoroAudio = normalizePomodoroAudioSettings(state.pomodoroAudio);
        const shouldEnable = !state.pomodoroAudio.enabled;
        state.pomodoroAudio.enabled = shouldEnable;
        persistPomodoroAudioSettings();

        try {
          if (shouldEnable) {
            await startPomodoroAudio();
            showToast("Đã bật " + getPomodoroSoundLabel(state.pomodoroAudio.type) + ".", "success");
          } else {
            stopPomodoroAudio();
            showToast("Đã tắt âm thanh Pomodoro.", "info");
          }
        } catch (error) {
          state.pomodoroAudio.enabled = false;
          persistPomodoroAudioSettings();
          stopPomodoroAudio();
          throw error;
        } finally {
          renderApp();
        }
      }

            showToast("Đã cập nhật trạng thái công việc.", "success");
          }

          renderAfterDataMutation("tasks");
        });
      }

          return `
            <div class="field password-field">
              <label for="${escapedName}">${escapeHtml(label)}</label>
              <div class="password-input-wrap">
                <input id="${escapedName}" name="${escapedName}" type="password" autocomplete="${autocomplete}" value="${escapeAttr(value)}" ${required ? "required" : ""} />
                <button class="password-toggle" data-action="toggle-password" data-target="${escapedName}" type="button" title="Hiện mật khẩu" aria-label="Hiện mật khẩu" aria-pressed="false">

      function renderBudgetInputField(label, name, value) {
        const amount = Math.max(0, Number(value || 0) || 0);
        return `
          <div class="field">
            <label for="${escapeAttr(name)}">${escapeHtml(label)}</label>
            <input id="${escapeAttr(name)}" name="${escapeAttr(name)}" class="budget-vnd-input" type="text" inputmode="numeric" autocomplete="off" value="${escapeAttr(formatVndInputValue(amount))}" data-raw-value="${escapeAttr(String(amount))}" />

            <div class="field-error" data-field-error-for="${escapeAttr(name)}" hidden></div>
          </div>
        `;
      }

      function parseVndInputValue(value) {
        const digits = String(value || "").replace(/[^\d]/g, "");
        if (!digits) {
          return 0;
        }
        return Math.max(0, Number(digits) || 0);
      }

      function formatVndInputValue(value) {
        const amount = typeof value === "number" ? Math.max(0, value || 0) : parseVndInputValue(value);
        if (!amount) {
          return typeof value === "number" ? "0" : "";
        }

      function updateBudgetInputNote(input) {

      function formatBudgetAmountDescription(value) {
        const amount = Math.max(0, Number(value || 0) || 0);
        if (!amount) {
          return "Nhập số tiền VND";
        }
        return `${formatVndInputValue(amount)} (${numberToVietnameseWords(amount)} VND)`;
      }

      function numberToVietnameseWords(value) {
        const amount = Math.floor(Math.max(0, Number(value || 0) || 0));
        if (!amount) {
          return "Không";
        }

        const scales = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
        const chunks = [];
        let remaining = amount;

        while (remaining > 0) {
          chunks.push(remaining % 1000);
          remaining = Math.floor(remaining / 1000);
        }

        const words = [];
        for (let index = chunks.length - 1; index >= 0; index -= 1) {
          if (!chunks[index]) {
            continue;
          }

          words.push(readVietnameseNumberChunk(chunks[index]));
          if (scales[index]) {
            words.push(scales[index]);
          }
        }

        const text = words.join(" ").replace(/\s+/g, " ").trim();
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function readVietnameseNumberChunk(value) {
        const digits = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
        const number = Math.max(0, Number(value || 0) || 0) % 1000;
        const hundreds = Math.floor(number / 100);
        const tens = Math.floor((number % 100) / 10);
        const ones = number % 10;
        const words = [];

        if (hundreds > 0) {
          words.push(digits[hundreds], "trăm");
        }

        if (tens > 1) {
          words.push(digits[tens], "mươi");
          if (ones === 1) {
            words.push("mốt");
          } else if (ones === 4) {
            words.push("tư");
          } else if (ones === 5) {
            words.push("lăm");
          } else if (ones > 0) {
            words.push(digits[ones]);
          }
        } else if (tens === 1) {
          words.push("mười");
          if (ones === 5) {
            words.push("lăm");
          } else if (ones > 0) {
            words.push(digits[ones]);
          }
        } else if (ones > 0) {
          if (hundreds > 0) {
            words.push("lẻ");
          }
          words.push(digits[ones]);
        }

        return words.join(" ");
      }

      function filterExpenses(expenses, payload) {
        const filters = payload || {};
        const keyword = String(filters.keyword || "").trim().toLowerCase();

          const date = String(expense.date || "");

          if (filters.userId && String(expense.userId || "") !== String(filters.userId)) {
            return false;
          }
          if (filters.month && date.slice(0, 7) !== filters.month) {
            return false;
          }
          if (filters.dateFrom && date < String(filters.dateFrom)) {
            return false;
          }
          if (filters.dateTo && date > String(filters.dateTo)) {
            return false;
          }
          if (filters.category && expense.category !== filters.category) {
            return false;
          }
          if (filters.paymentMethod && expense.paymentMethod !== filters.paymentMethod) {
            return false;
          }
          if (keyword && !`${expense.category || ""} ${expense.paymentMethod || ""} ${expense.note || ""}`.toLowerCase().includes(keyword)) {
            return false;
          }
          return true;
        });
      }

      function filterStudyLogs(logs, payload) {
        const filters = payload || {};
        return logs.filter((log) => {
          const date = String(log.date || "");

          if (filters.userId && String(log.userId || "") !== String(filters.userId)) {
            return false;
          }
          if (filters.month && String(log.date || "").slice(0, 7) !== filters.month) {
            return false;
          }
          if (filters.dateFrom && date < String(filters.dateFrom)) {
            return false;
          }
          if (filters.dateTo && date > String(filters.dateTo)) {
            return false;
          }
          if (filters.subjectId && log.subjectId !== filters.subjectId) {

          }
          if (filters.taskId && log.taskId !== filters.taskId) {

          }
          return true;
