      function normalizeGpaFilter(filter) {
        const source = filter || {};
        const mode = GPA_MODE_OPTIONS.some(([value]) => value === source.mode) ? source.mode : "semester";
        const semester = GPA_SEMESTER_OPTIONS.some(([value]) => value === source.semester) ? source.semester : "HK1";
        const academicYear = String(source.academicYear || currentAcademicYear()).trim() || currentAcademicYear();

        return { mode: mode, semester: semester, academicYear: academicYear };
      }

      function normalizeGpaSummary(summary) {
        const item = Object.assign({}, summary || {});

        return {
          mode: item.mode || state.gpaFilter.mode || "overall",
          semester: item.semester || "",
          academicYear: item.academicYear || "",
          totalCredits: Number(item.totalCredits || 0),
          subjectCount: Number(item.subjectCount || 0),
          gpa10: Number(item.gpa10 || 0),
          gpa4: Number(item.gpa4 || 0),
          classification: String(item.classification || "Chưa đủ dữ liệu"),
          percentileEstimate: String(item.percentileEstimate || "Chưa đủ dữ liệu"),
          disclaimer: String(item.disclaimer || GPA_DISCLAIMER)
        };
      }

      function normalizeGradeRecord(record) {
        const item = Object.assign({}, record || {});
        const score10 = clampNumber(Number(item.score10 || 0), 0, 10);
        const score4 = item.score4 === "" || item.score4 === undefined || item.score4 === null
          ? convertScore10ToScore4(score10)
          : clampNumber(Number(item.score4 || 0), 0, 4);

        return {
          id: String(item.id || ""),
          userId: String(item.userId || state.userId || ""),
          subjectName: String(item.subjectName || "").trim(),
          subjectId: String(item.subjectId || "").trim(),
          semester: String(item.semester || "HK1").trim() || "HK1",
          academicYear: String(item.academicYear || currentAcademicYear()).trim() || currentAcademicYear(),
          credits: Math.max(0, Number(item.credits || 0) || 0),
          score10: roundToTwo(score10),
          score4: roundToTwo(score4),
          letterGrade: String(item.letterGrade || score10ToLetterGrade(score10)).trim() || score10ToLetterGrade(score10),
          includeInGpa: item.includeInGpa === undefined || item.includeInGpa === null || String(item.includeInGpa).trim() === "" ? true : isIncludedInGpa(item.includeInGpa),
          note: String(item.note || "").trim(),
          createdAt: String(item.createdAt || ""),
          updatedAt: String(item.updatedAt || "")
        };
      }

      function buildGradeRecordPayload(payload) {
        const source = payload || {};
        const subjectId = String(source.subjectId || "").trim();
        const subject = subjectId ? assertOwnedLocalSubject(subjectId) : null;
        const subjectName = String(source.subjectName || (subject && subject.name) || "").trim();
        const semester = String(source.semester || "").trim();
        const academicYear = String(source.academicYear || "").trim();
        const credits = Number(source.credits || 0);
        const score10 = Number(source.score10 || 0);

        if (!subjectId && !subjectName) {
          throw createValidationError("Vui lòng chọn môn có sẵn hoặc nhập tên môn.", "subjectName");
        }

        if (!semester) {
          throw createValidationError("Học kỳ không được để trống.", "semester");
        }

        if (!academicYear) {
          throw createValidationError("Năm học không được để trống.", "academicYear");
        }

        if (!Number.isFinite(credits) || credits <= 0) {
          throw createValidationError("Số tín chỉ phải lớn hơn 0.", "credits");
        }

        if (!Number.isFinite(score10) || score10 < 0 || score10 > 10) {
          throw createValidationError("Điểm hệ 10 phải từ 0 đến 10.", "score10");
        }

        return {
          subjectName: subjectName,
          subjectId: subjectId,
          semester: semester,
          academicYear: academicYear,
          credits: roundToTwo(credits),
          score10: roundToTwo(score10),
          score4: convertScore10ToScore4(score10),
          letterGrade: score10ToLetterGrade(score10),
          includeInGpa: Boolean(source.includeInGpa),
          note: String(source.note || "").trim()
        };
      }

      function filterGradeRecords(records, payload) {
        const filters = payload || {};
        const mode = String(filters.mode || "").trim();

        return (records || []).map(normalizeGradeRecord).filter((record) => {
          if (filters.userId && String(record.userId || "") !== String(filters.userId)) {
            return false;
          }

          if (mode === "semester") {
            if (filters.academicYear && String(record.academicYear || "") !== String(filters.academicYear)) {
              return false;
            }

            if (filters.semester && String(record.semester || "") !== String(filters.semester)) {
              return false;
            }
          } else if (mode === "year") {
            if (filters.academicYear && String(record.academicYear || "") !== String(filters.academicYear)) {
              return false;
            }
          }

          return true;
        }).sort(sortGradeRecords);
      }

      function computeGpaSummary(payload) {
        const filter = normalizeGpaFilter(payload || {});
        const records = filterGradeRecords(state.gradeRecords, filter).filter((record) => isIncludedInGpa(record.includeInGpa));
        const totals = records.reduce((output, record) => {
          const credits = Math.max(0, Number(record.credits || 0) || 0);
          output.credits += credits;
          output.score10 += Number(record.score10 || 0) * credits;
          output.score4 += Number(record.score4 || 0) * credits;
          return output;
        }, { credits: 0, score10: 0, score4: 0 });
        const gpa10 = totals.credits > 0 ? roundToTwo(totals.score10 / totals.credits) : 0;
        const gpa4 = totals.credits > 0 ? roundToTwo(totals.score4 / totals.credits) : 0;

        return {
          mode: filter.mode,
          semester: filter.semester,
          academicYear: filter.academicYear,
          totalCredits: roundToTwo(totals.credits),
          subjectCount: records.length,
          gpa10: gpa10,
          gpa4: gpa4,
          classification: totals.credits > 0 ? gpaClassification(gpa4) : "Chưa đủ dữ liệu",
          percentileEstimate: totals.credits > 0 ? gpaPercentileEstimate(gpa4) : "Chưa đủ dữ liệu",
          disclaimer: GPA_DISCLAIMER
        };
      }

      function sortGradeRecords(a, b) {
        return String(b.academicYear || "").localeCompare(String(a.academicYear || ""))
          || String(a.semester || "").localeCompare(String(b.semester || ""))
          || String(a.subjectName || getSubjectName(a.subjectId)).localeCompare(String(b.subjectName || getSubjectName(b.subjectId)));
      }

      function convertScore10ToScore4(score10) {
        const score = Number(score10 || 0);
        if (score >= 8.5) return 4;
        if (score >= 8.0) return 3.5;
        if (score >= 7.0) return 3;
        if (score >= 6.5) return 2.5;
        if (score >= 5.5) return 2;
        if (score >= 5.0) return 1.5;
        if (score >= 4.0) return 1;
        return 0;
      }

      function score10ToLetterGrade(score10) {
        const score = Number(score10 || 0);
        if (score >= 8.5) return "A";
        if (score >= 8.0) return "B+";
        if (score >= 7.0) return "B";
        if (score >= 6.5) return "C+";
        if (score >= 5.5) return "C";
        if (score >= 5.0) return "D+";
        if (score >= 4.0) return "D";
        return "F";
      }

      function isIncludedInGpa(value) {
        if (typeof value === "boolean") {
          return value;
        }

        return ["true", "1", "yes", "y", "on"].includes(String(value || "").trim().toLowerCase());
      }

      function roundToTwo(value) {
        return Math.round(Number(value || 0) * 100) / 100;
      }

      function formatGpaValue(value) {
        const number = Number(value || 0);

        if (!Number.isFinite(number)) {
          return "0";
        }

        return number.toLocaleString("vi-VN", { maximumFractionDigits: 2 });
      }

      function formatGpaInputValue(value) {
        const number = Number(value || 0);

        if (!Number.isFinite(number)) {
          return "0";
        }

        return String(roundToTwo(number));
      }

      function gpaClassification(gpa4) {
        const gpa = Number(gpa4 || 0);
        if (gpa >= 3.6) return "Xuất sắc";
        if (gpa >= 3.2) return "Giỏi";
        if (gpa >= 2.5) return "Khá";
        if (gpa >= 2.0) return "Trung bình";
        return "Cần cải thiện";
      }

      function gpaPercentileEstimate(gpa4) {
        const gpa = Number(gpa4 || 0);
        if (gpa >= 3.8) return "Ước lượng top 5–10%";
        if (gpa >= 3.6) return "Ước lượng top 10–15%";
        if (gpa >= 3.2) return "Ước lượng top 20–30%";
        if (gpa >= 2.5) return "Nhóm trung bình khá";
        if (gpa >= 2.0) return "Nhóm trung bình";
        return "Cần cải thiện";
      }

      function syncGradeScorePreview() {

        preview.textContent = "Quy đổi: " + formatGpaValue(score10) + "/10 · " + formatGpaValue(score4) + "/4.0 · Điểm chữ " + letter;
      }

          return "Không gắn môn";
        }

        const subject = findById(state.subjects, subjectId);
        return subject ? subject.name : "Môn đã xóa";
      }

      function categoryLabel(value) {
        return CATEGORY_LABELS[value] || value || "Khác";
      }

      function typeLabel(value) {
        return TYPE_LABELS[normalizeTaskType(value)] || value || "Khác";
      }

      function priorityLabel(value) {
        return "Ưu tiên " + (PRIORITY_LABELS[normalizeTaskPriority(value)] || value || "vừa");
      }

      function paymentLabel(value) {
        return PAYMENT_METHOD_LABELS[value] || "Khác";
      }

      function statusLabel(value) {
        return STATUS_LABELS[normalizeTaskStatus(value)] || value || "Cần làm";
      }

      function normalizeTaskType(value) {
        const normalized = String(value || "").trim().toLowerCase();
        const mapped = { study: "assignment", work: "other" }[normalized] || normalized;
        return TYPE_LABELS[mapped] ? mapped : "assignment";
      }

      function normalizeTaskPriority(value) {
        const normalized = String(value || "").trim().toLowerCase();
        return PRIORITY_LABELS[normalized] ? normalized : "medium";
      }

      function normalizeTaskStatus(value) {
        const normalized = String(value || "").trim().toLowerCase();
        const mapped = { in_progress: "doing", inprogress: "doing", canceled: "cancelled" }[normalized] || normalized;
        return STATUS_LABELS[mapped] ? mapped : "todo";
      }

      function normalizeTaskRecord(task) {
        const item = Object.assign({}, task || {});
        item.title = String(item.title || "").trim();
        item.description = String(item.description || "").trim();
        item.subjectId = String(item.subjectId || "");
        item.type = normalizeTaskType(item.type);
        item.priority = normalizeTaskPriority(item.priority);
        item.status = normalizeTaskStatus(item.status);
        item.dueDate = String(item.dueDate || "");
        item.dueTime = String(item.dueTime || "");
        item.estimatedMinutes = Math.max(0, Number(item.estimatedMinutes || 0) || 0);
        item.completedAt = item.status === "done" ? String(item.completedAt || item.updatedAt || item.createdAt || "") : "";
        return item;
      }

      function isTaskOpen(task) {
        const status = normalizeTaskStatus(task.status);
        return status === "todo" || status === "doing";
      }

      function isTaskOverdue(task) {
        const item = normalizeTaskRecord(task);

        if (!item.dueDate || !isTaskOpen(item)) {
          return false;
        }

        const dueMoment = new Date(`${item.dueDate}T${item.dueTime || "23:59"}:00`);

        if (Number.isNaN(dueMoment.getTime())) {
          return item.dueDate < today();
        }

        return dueMoment.getTime() < Date.now();
      }

      function formatTaskDeadline(task) {
        const item = normalizeTaskRecord(task);

        if (!item.dueDate) {
          return "Chưa có deadline";
        }

        return `${formatDate(item.dueDate)}${item.dueTime ? " · " + item.dueTime : ""}`;
      }

      function taskPriorityWeight(value) {
        return { low: 1, medium: 2, high: 3, urgent: 4 }[normalizeTaskPriority(value)] || 0;
      }

      function sortByPriority(a, b) {
        return taskPriorityWeight(b.priority) - taskPriorityWeight(a.priority) || sortByDueDate(a, b) || String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
      }

      function sortByNewest(a, b) {
        return String(b.createdAt || "").localeCompare(String(a.createdAt || "")) || sortByDueDate(a, b);
      }

      function sortVisibleTasks(a, b) {
        if (state.taskSort === "priority") {
          return sortByPriority(a, b);
        }

        if (state.taskSort === "created") {
          return sortByNewest(a, b);
        }

        return sortByDueDate(a, b);
      }

      function localId(prefix) {
        return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
      }

      function sum(items, fieldName) {
        return items.reduce((total, item) => total + Number(item[fieldName] || 0), 0);
      }

      function groupSum(items, groupField, valueField) {
        return items.reduce((output, item) => {
          const key = item[groupField] || "unknown";
          output[key] = (output[key] || 0) + Number(item[valueField] || 0);
          return output;
        }, {});
      }

      function topKey(object) {
        return Object.keys(object || {}).sort((a, b) => Number(object[b] || 0) - Number(object[a] || 0))[0] || "";
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function currentMonth() {
        return new Date().toISOString().slice(0, 7);
      }

      function currentAcademicYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        return month >= 8 ? `${year}-${year + 1}` : `${year - 1}-${year}`;
      }

      function addDays(dateText, days) {
        const date = new Date(String(dateText) + "T00:00:00");
        date.setDate(date.getDate() + days);
        return date.toISOString().slice(0, 10);
      }

      function startOfWeek(dateText) {
        const date = new Date(String(dateText) + "T00:00:00");
        const day = date.getDay();
        const diff = (day + 6) % 7;
        date.setDate(date.getDate() - diff);
        return date.toISOString().slice(0, 10);
      }

      function daysInMonth(month) {
        const parts = String(month).split("-");
        return new Date(Number(parts[0]), Number(parts[1]), 0).getDate();
      }

      function sortByDueDate(a, b) {
        const aKey = String(a.dueDate || "9999-12-31") + " " + String(a.dueTime || "23:59");
        const bKey = String(b.dueDate || "9999-12-31") + " " + String(b.dueTime || "23:59");
        return aKey.localeCompare(bKey);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      /* ===== Boot ===== */
      (function initApp() {
        const defaultApiUrl = String(window.APP_CONFIG.API_URL || "").trim();
        const storedApiUrl = loadLocal(STORAGE_KEYS.apiUrl, null);
        window.APP_CONFIG.API_URL = defaultApiUrl || (typeof storedApiUrl === "string" ? storedApiUrl.trim() : "");
        const storedUserId = loadLocal(STORAGE_KEYS.userId, "");
        const storedSessionToken = loadLocal(STORAGE_KEYS.sessionToken, "");
        state.userId = typeof storedUserId === "string" ? storedUserId : "";
        state.sessionToken = typeof storedSessionToken === "string" ? storedSessionToken : "";
        state.sessionRestoreInProgress = Boolean(state.sessionToken);
        setAuthScreen(state.sessionToken ? loadLocal(STORAGE_KEYS.authScreen, "login") : "login");
        const localSettings = loadLocal(STORAGE_KEYS.settings, {});
        state.displayName = localSettings.displayName || "Sinh viên";
        state.theme = localSettings.theme || "light";
        state.settings = getDefaultSettings();
        const storedCurrentView = loadLocal(STORAGE_KEYS.currentView, "guide");
        state.currentView = VIEWS[storedCurrentView] ? storedCurrentView : "guide";
        state.expenseMonth = currentMonth();
        state.statsMonth = currentMonth();
        applyTheme(state.theme);
        renderApp();
        restoreSession();
      })();
    </script>
  </body>
</html>
