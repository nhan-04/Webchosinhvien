<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniFlow - Quản lý học tập và chi tiêu</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      button {
        appearance: none;
        border: none;
        cursor: pointer;
        font: inherit;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* ===== App layout ===== */
      :root {
        --app-bg: #f7f4ed;
        --app-surface: #ffffff;
        --app-surface-soft: #fffaf0;
        --app-text: #18212f;
        --app-muted: #64748b;
        --app-border: #e8dfd0;
        --app-primary: #0f766e;
        --app-primary-strong: #115e59;
        --app-secondary: #f59e0b;
        --app-success: #16a34a;
        --app-danger: #dc2626;
        --app-info: #2563eb;
        --app-shadow: 0 20px 44px rgba(15, 23, 42, 0.08);
        --app-shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.08);
        --app-shadow-strong: 0 28px 70px rgba(15, 23, 42, 0.16);
        --app-info-soft: rgba(37, 99, 235, 0.12);
        --app-success-soft: rgba(22, 163, 74, 0.12);
        --app-warning-soft: #fff7ed;
        --app-danger-soft: rgba(220, 38, 38, 0.12);
        --app-radius-xl: 28px;
        --app-radius-lg: 20px;
        --app-radius-md: 14px;
      }

      html[data-theme="dark"] {
        --app-bg: #0f172a;
        --app-surface: #111827;
        --app-surface-soft: #172033;
        --app-text: #e5e7eb;
        --app-muted: #94a3b8;
        --app-border: #263244;
        --app-primary: #2dd4bf;
        --app-primary-strong: #14b8a6;
        --app-secondary: #fbbf24;
        --app-success: #22c55e;
        --app-danger: #f87171;
        --app-info: #60a5fa;
        --app-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        --app-shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.24);
        --app-shadow-strong: 0 28px 70px rgba(0, 0, 0, 0.5);
        --app-info-soft: rgba(96, 165, 250, 0.18);
        --app-success-soft: rgba(34, 197, 94, 0.18);
        --app-warning-soft: rgba(251, 191, 36, 0.18);
        --app-danger-soft: rgba(248, 113, 113, 0.18);
      }

      .mvp-shell {
        min-height: 100vh;
        color: var(--app-text);
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.16), transparent 28%),
          var(--app-bg);
      }

      .auth-shell {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: 24px 14px 40px;
        color: var(--app-text);
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.2), transparent 30%),
          radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.18), transparent 28%),
          var(--app-bg);
      }

      .auth-layout {
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .auth-hero,
      .auth-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9));
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius-xl);
        box-shadow: var(--app-shadow);
      }

      html[data-theme="dark"] .auth-hero,
      html[data-theme="dark"] .auth-card {
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(17, 24, 39, 0.9));
      }

      .auth-hero {
        padding: 24px 20px;
        color: #ffffff;
        background: linear-gradient(145deg, rgba(15, 118, 110, 0.96), rgba(17, 94, 89, 0.92));
      }

      .auth-hero p,
      .auth-hero .muted {
        color: rgba(255, 255, 255, 0.86);
      }

      .auth-hero h1 {
        margin: 14px 0 8px;
        font-size: 28px;
        line-height: 1.18;
      }

      .auth-grid {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .auth-highlight {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .auth-highlight strong {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .auth-card {
        padding: 18px;
      }

      .auth-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .auth-tab {
        border: 1px solid var(--app-border);
        border-radius: 16px;
        padding: 12px;
        background: var(--app-surface-soft);
        color: var(--app-muted);
        font-size: 13px;
        font-weight: 900;
      }

      .auth-tab.active {
        color: #ffffff;
        border-color: transparent;
        background: linear-gradient(135deg, var(--app-primary), var(--app-primary-strong));
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
      }

      .auth-form {
        display: grid;
        gap: 14px;
      }

      .auth-actions {
        display: grid;
        gap: 10px;
        margin-top: 4px;
      }

      .auth-note {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--app-border);
        background: var(--app-surface-soft);
        color: var(--app-muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .auth-note strong {
        color: var(--app-text);
      }

      .auth-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .auth-connection {
        font-size: 12px;
        color: var(--app-muted);
      }

      .mvp-sidebar {
        display: none;
      }

      .mvp-main {
        width: 100%;
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px 14px 112px;
      }

      .mvp-topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: -16px -14px 14px;
        padding: 14px;
        background: rgba(247, 244, 237, 0.78);
        border-bottom: 1px solid rgba(232, 223, 208, 0.72);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      html[data-theme="dark"] .mvp-topbar {
        background: rgba(15, 23, 42, 0.82);
        border-color: rgba(38, 50, 68, 0.9);
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 16px;
        color: #ffffff;
        background: linear-gradient(145deg, var(--app-primary), var(--app-primary-strong));
        box-shadow: 0 12px 28px rgba(15, 118, 110, 0.22);
        font-weight: 900;
      }

      .topbar-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .topbar-title h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.2;
      }

      .topbar-title p {
        margin: 2px 0 0;
        color: var(--app-muted);
        font-size: 12px;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .mode-pill,
      .badge-soft,
      .badge-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.01em;
        border: 1px solid rgba(15, 118, 110, 0.16);
        background: rgba(15, 118, 110, 0.1);
        color: var(--app-primary-strong);
      }

      html[data-theme="dark"] .mode-pill,
      html[data-theme="dark"] .badge-soft,
      html[data-theme="dark"] .badge-status {
        color: var(--app-primary);
        border-color: rgba(45, 212, 191, 0.22);
        background: rgba(45, 212, 191, 0.12);
      }

      .badge-info {
        color: #1d4ed8;
        border-color: rgba(37, 99, 235, 0.18);
        background: var(--app-info-soft);
      }

      .badge-success,
      .badge-priority-low,
      .badge-status-done {
        color: #166534;
        border-color: rgba(22, 163, 74, 0.18);
        background: var(--app-success-soft);
      }

      .badge-warning,
      .badge-priority-medium,
      .badge-status-todo {
        color: #92400e;
        border-color: rgba(245, 158, 11, 0.24);
        background: var(--app-warning-soft);
      }

      .badge-danger,
      .badge-priority-high,
      .badge-priority-urgent,
      .badge-status-cancelled {
        color: #991b1b;
        border-color: rgba(220, 38, 38, 0.2);
        background: var(--app-danger-soft);
      }

      .badge-status-doing {
        color: #1d4ed8;
        border-color: rgba(37, 99, 235, 0.18);
        background: var(--app-info-soft);
      }

      html[data-theme="dark"] .badge-info,
      html[data-theme="dark"] .badge-status-doing {
        color: #bfdbfe;
      }

      html[data-theme="dark"] .badge-success,
      html[data-theme="dark"] .badge-priority-low,
      html[data-theme="dark"] .badge-status-done {
        color: #bbf7d0;
      }

      html[data-theme="dark"] .badge-warning,
      html[data-theme="dark"] .badge-priority-medium,
      html[data-theme="dark"] .badge-status-todo {
        color: #fde68a;
      }

      html[data-theme="dark"] .badge-danger,
      html[data-theme="dark"] .badge-priority-high,
      html[data-theme="dark"] .badge-priority-urgent,
      html[data-theme="dark"] .badge-status-cancelled {
        color: #fecaca;
      }

      .view-root {
        display: grid;
        gap: 14px;
      }

      .section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .section-head p,
      .muted {
        margin: 4px 0 0;
        color: var(--app-muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .card,
      .mvp-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9));
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius-lg);
        box-shadow: var(--app-shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      html[data-theme="dark"] .mvp-card,
      html[data-theme="dark"] .card {
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(17, 24, 39, 0.88));
      }

      .mvp-card {
        padding: 18px;
      }

      .hero-card {
        overflow: hidden;
        color: #ffffff;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.96), rgba(17, 94, 89, 0.92)),
          var(--app-primary);
        box-shadow: var(--app-shadow-strong);
      }

      .hero-card .muted {
        color: rgba(255, 255, 255, 0.82);
      }

      .grid-cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat-card {
        display: grid;
        gap: 8px;
        min-height: 116px;
        padding: 16px;
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius-md);
        background: linear-gradient(180deg, var(--app-surface), var(--app-surface-soft));
      }

      .stat-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 900;
        line-height: 1.15;
      }

      .stat-label {
        color: var(--app-muted);
        font-size: 12px;
        font-weight: 700;
      }

      .list-stack {
        display: grid;
        gap: 12px;
      }

      .item-card {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 1px solid var(--app-border);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--app-surface), var(--app-surface-soft));
      }

      .subject-card {
        position: relative;
        overflow: hidden;
        gap: 14px;
        padding: 18px 18px 18px 20px;
        border-color: color-mix(in srgb, var(--subject-color, var(--app-primary)) 28%, var(--app-border));
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      }

      .subject-card::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 7px;
        background: var(--subject-color, var(--app-primary));
        border-radius: 0 10px 10px 0;
      }

      .subject-card > * {
        position: relative;
      }

      .subjects-list {
        gap: 14px;
      }

      .subject-card-top {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .subject-main {
        min-width: 0;
        flex: 1 1 240px;
      }

      .subject-card-aside {
        display: grid;
        gap: 8px;
        justify-items: start;
        flex: 0 0 auto;
      }

      .subject-credit-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 8px 12px;
        border-radius: 999px;
        color: var(--app-text);
        background: color-mix(in srgb, var(--subject-color, var(--app-primary)) 14%, var(--app-surface));
        box-shadow: var(--shadow-inset-soft);
        font-size: 12px;
        font-weight: 900;
      }

      .subject-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .subject-color-dot {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border: 3px solid rgba(255, 255, 255, 0.9);
        border-radius: 999px;
        background: var(--subject-color, var(--app-primary));
        box-shadow: 0 0 0 1px var(--app-border);
      }

      .subject-detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }

      .subject-detail {
        min-width: 0;
        padding: 12px;
        border: 1px solid var(--app-border);
        border-radius: 16px;
        background: var(--app-surface-soft);
        box-shadow: var(--shadow-inset-soft);
      }

      .subject-detail span {
        display: block;
        color: var(--app-muted);
        font-size: 11px;
        font-weight: 900;
      }

      .subject-detail strong {
        display: block;
        margin-top: 4px;
        font-size: 14px;
        line-height: 1.45;
        word-break: break-word;
      }

      .subject-note {
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid color-mix(in srgb, var(--subject-color, var(--app-primary)) 20%, var(--app-border));
        background: color-mix(in srgb, var(--subject-color, var(--app-primary)) 10%, var(--app-surface-soft));
      }

      .subject-note strong {
        display: block;
        margin-bottom: 6px;
      }

      .subject-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .subject-summary-tile {
        padding: 14px 16px;
        border-radius: 22px;
        background: rgba(39, 199, 184, 0.08);
        box-shadow: var(--shadow-inset-soft);
      }

      .subject-summary-tile span {
        display: block;
        color: var(--app-muted);
        font-size: 12px;
        font-weight: 800;
      }

      .subject-summary-tile strong {
        display: block;
        margin-top: 6px;
        font-size: 20px;
        line-height: 1.2;
      }

      .task-card {
        gap: 12px;
      }

      .task-card-overdue {
        border-color: color-mix(in srgb, var(--app-danger) 45%, var(--app-border));
        box-shadow: 0 12px 28px rgba(220, 38, 38, 0.1);
      }

      .task-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
      }

      .task-overdue-badge {
        color: #ffffff;
        background: var(--app-danger);
      }

      .task-status-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .task-sort-field {
        max-width: 240px;
      }

      .expense-hero-card {
        display: grid;
        gap: 16px;
      }

      .expense-hero-main,
      .expense-hero-side,
      .expense-filter-panel {
        min-width: 0;
      }

      .expense-hero-side {
        display: grid;
        gap: 12px;
      }

      .expense-add-btn {
        justify-self: start;
      }

      .expense-filter-panel {
        padding: 16px;
        border-radius: 24px;
        background: color-mix(in srgb, var(--app-surface-soft) 84%, transparent);
        box-shadow: var(--shadow-inset-soft);
      }

      .expense-toolbar {
        gap: 12px;
      }

      .expense-toolbar .form-grid {
        gap: 12px;
      }

      .budget-progress-copy {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .budget-alert {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--app-border);
        font-size: 13px;
        font-weight: 900;
      }

      .budget-alert.warning {
        color: #92400e;
        border-color: rgba(245, 158, 11, 0.35);
        background: rgba(245, 158, 11, 0.12);
      }

      .budget-alert.danger {
        color: #991b1b;
        border-color: rgba(220, 38, 38, 0.35);
        background: rgba(220, 38, 38, 0.12);
      }

      html[data-theme="dark"] .budget-alert.warning {
        color: #fcd34d;
        border-color: rgba(251, 191, 36, 0.35);
        background: rgba(251, 191, 36, 0.14);
      }

      html[data-theme="dark"] .budget-alert.danger {
        color: #fecaca;
        border-color: rgba(248, 113, 113, 0.35);
        background: rgba(248, 113, 113, 0.14);
      }

      .study-log-note {
        padding: 10px 12px;
        border-radius: 14px;
        background: var(--app-surface-soft);
      }

      .pomodoro-panel {
        display: grid;
        gap: 14px;
        margin-top: 12px;
        padding: 16px;
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius-md);
        background: var(--app-surface-soft);
      }

      .pomodoro-mode-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .pomodoro-display {
        text-align: center;
        font-size: 46px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0.06em;
      }

      .pomodoro-status {
        text-align: center;
        color: var(--app-muted);
        font-size: 13px;
        font-weight: 800;
      }

      .pomodoro-context {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }

      .pomodoro-audio-panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border-radius: 22px;
        background: var(--app-surface);
        box-shadow: var(--shadow-inset-soft);
      }

      .pomodoro-audio-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .pomodoro-audio-title {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .pomodoro-audio-title strong {
        color: var(--app-text);
        font-size: 13px;
        font-weight: 900;
      }

      .pomodoro-audio-title span {
        color: var(--app-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .pomodoro-audio-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
      }

      .volume-field {
        display: grid;
        gap: 9px;
      }

      .volume-copy {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--app-muted);
        font-size: 12px;
        font-weight: 800;
      }

      input[type="range"] {
        min-height: 28px;
        padding: 0;
        border-radius: 999px;
        background: transparent;
        box-shadow: none;
        cursor: pointer;
        accent-color: var(--app-primary);
      }

      input[type="range"]:focus,
      input[type="range"]:focus-visible {
        box-shadow: none;
      }

      @media (min-width: 720px) {
        .pomodoro-audio-controls {
          grid-template-columns: minmax(180px, 0.9fr) minmax(220px, 1.1fr);
          align-items: end;
        }
      }

      .item-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .item-title {
        margin: 0;
        font-size: 15px;
        font-weight: 900;
      }

      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--app-muted);
        font-size: 12px;
      }

      .item-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .item-actions .btn,
      .task-status-actions .btn,
      .modal-actions .btn {
        flex: 1 1 140px;
      }

      .btn,
      .icon-btn,
      .nav-link {
        border: 0;
        cursor: pointer;
        font: inherit;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 46px;
        border-radius: 16px;
        padding: 12px 15px;
        font-size: 13px;
        font-weight: 900;
        box-shadow: var(--app-shadow-soft);
        transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      }

      .btn:hover,
      .icon-btn:hover,
      .nav-link:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        color: #ffffff;
        background: linear-gradient(135deg, var(--app-primary), var(--app-primary-strong));
      }

      .btn-secondary {
        color: var(--app-text);
        background: linear-gradient(180deg, var(--app-surface), var(--app-surface-soft));
        border: 1px solid var(--app-border);
      }

      .btn-danger {
        color: #ffffff;
        background: linear-gradient(135deg, var(--app-danger), #dc2626);
      }

      .btn-ghost {
        color: var(--app-muted);
        background: transparent;
        border: 1px solid var(--app-border);
        box-shadow: none;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 16px;
        color: var(--app-text);
        background: var(--app-surface-soft);
        border: 1px solid var(--app-border);
        box-shadow: var(--app-shadow-soft);
      }

      .toolbar {
        display: grid;
        gap: 12px;
      }

      .filter-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .filter-chip {
        flex: 0 0 auto;
        border: 1px solid var(--app-border);
        border-radius: 999px;
        padding: 9px 12px;
        color: var(--app-muted);
        background: var(--app-surface);
        font-size: 13px;
        font-weight: 900;
      }

      .filter-chip.active {
        color: #ffffff;
        border-color: var(--app-primary);
        background: var(--app-primary);
      }

      .preset-colors {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .subject-form-grid {
        align-items: start;
      }

      .subject-color-field {
        align-content: start;
      }

      .subject-color-control {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .subject-color-code {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 8px 12px;
        border-radius: 999px;
        color: var(--app-text);
        background: var(--app-surface-soft);
        box-shadow: var(--shadow-inset-soft);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.04em;
      }

      .preset-color {
        width: 34px;
        height: 34px;
        min-height: 34px;
        padding: 0;
        border: 3px solid var(--app-surface);
        border-radius: 999px;
        background: var(--preset-color);
        box-shadow: 0 0 0 1px var(--app-border);
      }

      .preset-color.active {
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.22);
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--app-border);
        border-radius: 16px;
        padding: 13px 14px;
        color: var(--app-text);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.88));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
        font: inherit;
        font-size: 16px;
        outline: none;
      }

      input[type="color"] {
        width: 64px;
        min-width: 64px;
        min-height: 56px;
        padding: 6px;
        border-radius: 18px;
        cursor: pointer;
        overflow: hidden;
        flex: 0 0 auto;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      input[type="color"]::-webkit-color-swatch {
        border: 0;
        border-radius: 12px;
      }

      input[type="color"]::-moz-color-swatch {
        border: 0;
        border-radius: 12px;
      }

      html[data-theme="dark"] input,
      html[data-theme="dark"] select,
      html[data-theme="dark"] textarea {
        background: rgba(15, 23, 42, 0.88);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      input::placeholder,
      textarea::placeholder {
        color: color-mix(in srgb, var(--app-muted) 92%, transparent);
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--app-primary);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      }

      .form-grid {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        display: block;
        margin: 0;
        color: var(--app-muted);
        font-size: 12px;
        font-weight: 900;
      }

      .empty-state {
        display: grid;
        justify-items: center;
        gap: 10px;
        min-height: 180px;
        padding: 24px 18px;
        border: 1px dashed var(--app-border);
        border-radius: var(--app-radius-lg);
        color: var(--app-muted);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), var(--app-surface-soft));
        text-align: center;
      }

      .empty-state-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        border-radius: 18px;
        color: var(--app-primary-strong);
        background: rgba(15, 118, 110, 0.1);
        font-size: 24px;
        font-weight: 900;
      }

      .empty-state strong {
        color: var(--app-text);
        font-size: 16px;
      }

      .empty-state p {
        margin: 0;
        max-width: 360px;
      }

      .chart-row {
        display: grid;
        gap: 10px;
      }

      .quick-actions-grid,
      .analytics-grid,
      .top-list {
        display: grid;
        gap: 10px;
      }

      .compact-list {
        display: grid;
        gap: 10px;
      }

      .compact-row {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--app-border);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--app-surface), var(--app-surface-soft));
      }

      .compact-row-top,
      .meter-copy,
      .top-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .compact-row-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
      }

      .compact-row-value,
      .top-item strong {
        font-size: 13px;
        font-weight: 900;
      }

      .compact-row-value {
        color: var(--app-primary-strong);
      }

      .compact-row-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--app-muted);
        font-size: 12px;
      }

      .top-item {
        padding: 14px;
        border: 1px solid var(--app-border);
        border-radius: 18px;
        background: linear-gradient(180deg, var(--app-surface), var(--app-surface-soft));
      }

      .top-rank {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border-radius: 999px;
        color: #ffffff;
        background: linear-gradient(135deg, var(--app-primary), var(--app-secondary));
        font-size: 12px;
        font-weight: 900;
      }

      .top-copy {
        flex: 1;
        min-width: 0;
      }

      .meter-card {
        display: grid;
        gap: 12px;
      }

      .meter-copy strong {
        font-size: 28px;
        line-height: 1;
      }

      .bar-line {
        display: grid;
        grid-template-columns: minmax(74px, 92px) 1fr auto;
        align-items: center;
        gap: 10px;
        font-size: 12px;
      }

      .bar-line strong,
      .bar-line span {
        min-width: 0;
      }

      .bar-line strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bar-track {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--app-surface-soft);
      }

      .bar-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--app-primary), var(--app-secondary));
      }

      .mvp-bottom-nav {
        position: fixed;
        right: 12px;
        bottom: 12px;
        left: 12px;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 4px;
        padding: 8px 5px;
        border: 1px solid rgba(232, 223, 208, 0.82);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--app-shadow-strong);
      }

      html[data-theme="dark"] .mvp-bottom-nav {
        border-color: rgba(38, 50, 68, 0.9);
        background: rgba(17, 24, 39, 0.9);
      }

      .mvp-shell button,
      .mvp-bottom-nav button,
      .modal-root button {
        min-width: 0;
      }

      .nav-link {
        display: grid;
        justify-items: center;
        gap: 4px;
        padding: 10px 4px;
        border-radius: 16px;
        border: 1px solid transparent;
        color: var(--app-muted);
        background: transparent;
        font-size: 11px;
        font-weight: 900;
        transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
      }

      .mvp-bottom-nav .nav-link {
        gap: 3px;
        padding: 9px 3px;
        font-size: 10.5px;
      }

      .nav-link .nav-icon {
        font-size: 17px;
        line-height: 1;
      }

      .nav-link.active {
        color: #ffffff;
        background: linear-gradient(135deg, var(--app-primary), var(--app-primary-strong));
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
      }

      .toast-root {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: var(--z-toast);
        display: grid;
        gap: 8px;
        width: min(380px, calc(100vw - 28px));
        pointer-events: none;
      }

      .toast {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: flex-start;
        gap: 12px;
        padding: 14px;
        border-radius: 18px;
        color: var(--app-text);
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--app-border);
        box-shadow: var(--app-shadow-strong);
        font-size: 13px;
        font-weight: 800;
        pointer-events: auto;
        animation: toast-enter 0.22s ease;
      }

      html[data-theme="dark"] .toast {
        background: rgba(17, 24, 39, 0.96);
      }

      .toast.toast-leave {
        animation: toast-exit 0.18s ease forwards;
      }

      .toast-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 900;
      }

      .toast-copy {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .toast-copy strong {
        font-size: 13px;
        line-height: 1.3;
      }

      .toast-copy span {
        color: var(--app-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .toast.info {
        border-color: rgba(37, 99, 235, 0.24);
      }

      .toast.info .toast-icon {
        color: #1d4ed8;
        background: var(--app-info-soft);
      }

      .toast.success {
        border-color: rgba(34, 197, 94, 0.32);
      }

      .toast.success .toast-icon {
        color: #166534;
        background: var(--app-success-soft);
      }

      .toast.error {
        border-color: rgba(220, 38, 38, 0.32);
      }

      .toast.error .toast-icon {
        color: #991b1b;
        background: var(--app-danger-soft);
      }

      .toast.warning {
        border-color: rgba(245, 158, 11, 0.32);
      }

      .toast.warning .toast-icon {
        color: #92400e;
        background: var(--app-warning-soft);
      }

      .modal-root {
        position: fixed;
        inset: 0;
        z-index: var(--z-backdrop);
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding: 12px;
        background: rgba(15, 23, 42, 0.58);
      }

      .modal-root.open {
        display: flex;
      }

      .modal-panel {
        position: relative;
        z-index: var(--z-modal);
        width: min(640px, 100%);
        max-height: min(88vh, 760px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--app-border);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.94));
        box-shadow: var(--app-shadow-strong);
      }

      html[data-theme="dark"] .modal-panel {
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(17, 24, 39, 0.94));
      }

      .modal-panel form {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .modal-head,
      .modal-actions {
        position: sticky;
        background: var(--app-surface);
        z-index: 1;
      }

      .modal-head {
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--app-border);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
      }

      .modal-body {
        flex: 1 1 auto;
        overflow: auto;
        padding: 18px 16px;
      }

      .modal-inline-error,
      .field-error {
        display: none;
        color: #991b1b;
        background: var(--app-danger-soft);
        border: 1px solid rgba(220, 38, 38, 0.24);
        border-radius: 14px;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.45;
      }

      .modal-inline-error {
        margin-bottom: 14px;
        padding: 10px 12px;
      }

      .field-error {
        margin-top: 6px;
        padding: 8px 10px;
      }

      .modal-inline-error:not([hidden]),
      .field-error:not([hidden]) {
        display: block;
      }

      .field.invalid input,
      .field.invalid select,
      .field.invalid textarea {
        border-color: rgba(220, 38, 38, 0.72);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
      }

      .modal-actions {
        bottom: 0;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        padding: 14px 16px 16px;
        border-top: 1px solid var(--app-border);
        box-shadow: 0 -6px 18px rgba(15, 23, 42, 0.04);
      }

      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: var(--z-loading);
        display: none;
        place-items: center;
        background: rgba(15, 23, 42, 0.36);
      }

      .loading-overlay.open {
        display: grid;
      }

      .loading-panel {
        display: grid;
        justify-items: center;
        gap: 14px;
        width: min(320px, calc(100vw - 40px));
        padding: 22px 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(17, 24, 39, 0.84);
        box-shadow: var(--app-shadow-strong);
        text-align: center;
      }

      .loading-copy {
        display: grid;
        gap: 4px;
        color: #ffffff;
      }

      .loading-copy strong {
        font-size: 16px;
      }

      .loading-copy span {
        color: rgba(255, 255, 255, 0.76);
        font-size: 13px;
        line-height: 1.45;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid rgba(255, 255, 255, 0.45);
        border-top-color: var(--app-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes toast-enter {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes toast-exit {
        from {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        to {
          opacity: 0;
          transform: translateY(-6px) scale(0.98);
        }
      }

      @media (hover: hover) {
        .mvp-card:hover,
        .item-card:hover,
        .stat-card:hover,
        .compact-row:hover,
        .top-item:hover {
          transform: translateY(-2px);
          box-shadow: var(--app-shadow-strong);
        }
      }

      @media (min-width: 720px) {
        .subject-summary-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid-cards {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .quick-actions-grid,
        .analytics-grid,
        .top-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          grid-template-columns: 1fr auto;
          align-items: center;
        }

        .form-grid.two {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .modal-root {
          align-items: center;
        }

        .modal-actions .btn,
        .item-actions .btn,
        .task-status-actions .btn {
          flex: 0 1 auto;
        }
      }

      @media (min-width: 960px) {
        .mvp-shell {
          display: grid;
          grid-template-columns: 280px 1fr;
        }

        .mvp-sidebar {
          position: sticky;
          top: 0;
          display: flex;
          flex-direction: column;
          gap: 22px;
          height: 100vh;
          padding: 24px 18px;
          border-right: 1px solid var(--app-border);
          background: rgba(255, 255, 255, 0.74);
          box-shadow: inset -1px 0 0 rgba(232, 223, 208, 0.62);
        }

        html[data-theme="dark"] .mvp-sidebar {
          background: rgba(17, 24, 39, 0.76);
        }

        .sidebar-nav {
          display: grid;
          gap: 8px;
          padding: 8px;
          border: 1px solid var(--app-border);
          border-radius: 24px;
          background: rgba(255, 255, 255, 0.58);
          box-shadow: var(--app-shadow-soft);
        }

        html[data-theme="dark"] .sidebar-nav {
          background: rgba(15, 23, 42, 0.58);
        }

        .sidebar-nav .nav-link {
          grid-template-columns: 26px 1fr;
          justify-items: start;
          padding: 12px;
          border-radius: 18px;
          font-size: 14px;
        }

        .sidebar-nav .nav-link.active {
          box-shadow: 0 16px 32px rgba(15, 118, 110, 0.18);
        }

        .mvp-sidebar .mvp-card {
          background: rgba(255, 255, 255, 0.7);
        }

        html[data-theme="dark"] .mvp-sidebar .mvp-card {
          background: rgba(17, 24, 39, 0.76);
        }

        .mvp-main {
          max-width: 1180px;
          padding: 22px 24px 46px;
        }

        .mvp-topbar {
          margin: -22px -24px 18px;
          padding: 18px 24px;
        }

        .mvp-bottom-nav {
          display: none;
        }
      }

      /* ===== Soft UI design system ===== */
      :root {
        --bg: #e0e5ec;
        --surface: #e0e5ec;
        --surface-strong: #e0e5ec;
        --text: #3f4a5a;
        --muted: #7b8798;
        --primary: #27c7b8;
        --danger: #ef6f6c;
        --warning: #f2b84b;
        --success: #5fbf88;
        --shadow: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        --radius-lg: 32px;
        --radius-md: 24px;
        --radius-sm: 18px;
        --app-bg: #e0e5ec;
        --app-surface: #e0e5ec;
        --app-surface-soft: #e0e5ec;
        --app-text: #3f4a5a;
        --app-muted: #7b8798;
        --app-border: rgba(255, 255, 255, 0.24);
        --app-primary: #27c7b8;
        --app-primary-strong: #1cb3a6;
        --app-secondary: #f2b84b;
        --app-success: #5fbf88;
        --app-danger: #ef6f6c;
        --app-info: #7c99d6;
        --app-shadow: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        --app-shadow-soft: 5px 5px 12px rgba(163, 177, 198, 0.45), -5px -5px 12px rgba(255, 255, 255, 0.75);
        --app-shadow-strong: 14px 14px 28px rgba(163, 177, 198, 0.62), -12px -12px 24px rgba(255, 255, 255, 0.82);
        --app-info-soft: rgba(124, 153, 214, 0.16);
        --app-success-soft: rgba(95, 191, 136, 0.18);
        --app-warning-soft: rgba(242, 184, 75, 0.2);
        --app-danger-soft: rgba(239, 111, 108, 0.18);
        --app-radius-xl: 32px;
        --app-radius-lg: 28px;
        --app-radius-md: 22px;
        --shadow-raised: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
        --shadow-soft: 5px 5px 12px rgba(163, 177, 198, 0.45), -5px -5px 12px rgba(255, 255, 255, 0.75);
        --shadow-inset: inset 8px 8px 16px rgba(163, 177, 198, 0.55), inset -8px -8px 16px rgba(255, 255, 255, 0.75);
        --shadow-inset-soft: inset 4px 4px 8px rgba(163, 177, 198, 0.45), inset -4px -4px 8px rgba(255, 255, 255, 0.7);
        --shadow-accent: 0 0 0 3px rgba(39, 199, 184, 0.18);
        --z-base: 1;
        --z-dropdown: 50;
        --z-backdrop: 1000;
        --z-modal: 1100;
        --z-loading: 1200;
        --z-toast: 99999;
      }

      html[data-theme="dark"] {
        --bg: #20242c;
        --surface: #20242c;
        --surface-strong: #20242c;
        --text: #e4e8ef;
        --muted: #9aa4b5;
        --primary: #2dd4bf;
        --danger: #ef8a87;
        --warning: #f2c977;
        --success: #72c596;
        --shadow: 8px 8px 16px rgba(10, 12, 16, 0.55), -8px -8px 16px rgba(55, 62, 74, 0.35);
        --app-bg: #20242c;
        --app-surface: #20242c;

        --app-secondary: #f2c977;
        --app-success: #72c596;
        --app-danger: #ef8a87;
        --app-info: #94b4ff;
        --app-shadow: 8px 8px 16px rgba(10, 12, 16, 0.55), -8px -8px 16px rgba(55, 62, 74, 0.35);
        --app-shadow-soft: 5px 5px 12px rgba(10, 12, 16, 0.45), -5px -5px 12px rgba(55, 62, 74, 0.28);
        --app-shadow-strong: 16px 16px 32px rgba(10, 12, 16, 0.58), -12px -12px 24px rgba(55, 62, 74, 0.26);
        --app-info-soft: rgba(148, 180, 255, 0.16);
        --app-success-soft: rgba(114, 197, 150, 0.18);
        --app-warning-soft: rgba(242, 201, 119, 0.18);
        --app-danger-soft: rgba(239, 138, 135, 0.18);
        --shadow-raised: 8px 8px 16px rgba(10, 12, 16, 0.55), -8px -8px 16px rgba(55, 62, 74, 0.35);
        --shadow-soft: 5px 5px 12px rgba(10, 12, 16, 0.45), -5px -5px 12px rgba(55, 62, 74, 0.28);
        --shadow-inset: inset 8px 8px 16px rgba(10, 12, 16, 0.55), inset -8px -8px 16px rgba(55, 62, 74, 0.3);
        --shadow-inset-soft: inset 4px 4px 8px rgba(10, 12, 16, 0.45), inset -4px -4px 8px rgba(55, 62, 74, 0.24);
        --shadow-accent: 0 0 0 3px rgba(45, 212, 191, 0.18);

      html[data-theme="dark"] .card,
      html[data-theme="dark"] .auth-hero,

      .hero-card {

        height: 72px;

        font-size: 13px;

      .btn-primary {
        color: #ffffff;
        background: linear-gradient(145deg, rgba(39, 199, 184, 0.96), rgba(28, 179, 166, 0.92));

      .btn-danger {
        color: #ffffff;
        background: linear-gradient(145deg, rgba(239, 111, 108, 0.95), rgba(220, 104, 101, 0.9));

      .icon-btn:active,

      input,

      select:focus,
      textarea:focus,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      .btn:focus-visible,
      .icon-btn:focus-visible,
      .nav-link:focus-visible,

      .filter-chip:focus-visible {

      textarea:focus,

      .icon-btn:focus-visible,
      .nav-link:focus-visible,

      }

      input[type="checkbox"] {
        appearance: none;
        width: 24px;
        min-width: 24px;
        height: 24px;
        min-height: 24px;
        padding: 0;
        border-radius: 10px;
        display: inline-grid;
        place-items: center;
        cursor: pointer;
      }

      input[type="checkbox"]::after {
        content: "";
        width: 10px;
        height: 6px;
        border-left: 3px solid #ffffff;
        border-bottom: 3px solid #ffffff;
        transform: rotate(-45deg) scale(0);
        transition: transform 0.16s ease;
      }

      input[type="checkbox"]:checked {
        background: linear-gradient(145deg, rgba(39, 199, 184, 0.96), rgba(28, 179, 166, 0.92));
      }

      input[type="checkbox"]:checked::after {
        transform: rotate(-45deg) scale(1);
      }

      .soft-toggle,
      .reminder-offset-chip {

        align-items: center;
        gap: 12px;
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 20px;
        background: var(--app-surface);
        box-shadow: var(--shadow-soft);
        color: var(--app-text);
        cursor: pointer;
      }

      .soft-toggle {
        width: 100%;

      .reminder-offset-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

        background: var(--app-surface);
        box-shadow: var(--shadow-inset-soft);

      .task-toolbar .task-sort-field {
        width: 100%;
        max-width: none;
      }

      .toast-root {
        top: 14px;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        width: min(420px, calc(100vw - 24px));
        z-index: var(--z-toast);
      }

      .toast {
        position: relative;
        padding: 16px;
        border-radius: 24px;
      }

      .toast::before {
        content: "";
        position: absolute;
        top: 12px;
        bottom: 12px;
        left: 10px;
        width: 4px;
        border-radius: 999px;
        background: rgba(124, 153, 214, 0.6);
      }

      .toast.success::before {
        background: rgba(95, 191, 136, 0.72);
      }

      .toast.error::before {
        background: rgba(239, 111, 108, 0.72);
      }

      .toast.warning::before {
        background: rgba(242, 184, 75, 0.78);
      }

      .toast-icon {
        background: var(--app-surface);
        box-shadow: var(--shadow-inset-soft);
      }

      .modal-root {
        background: rgba(63, 74, 90, 0.16);
      }

      html[data-theme="dark"] .modal-root {
        background: rgba(10, 12, 16, 0.42);
      }

      .modal-panel {
        width: min(680px, 100%);
        max-height: min(90vh, 780px);
        border-radius: 32px;
      }

      .budget-alert.warning,

        border: none;

        color: #ffe0a6;
        background: var(--app-surface);

        color: #ffb5b3;
        background: var(--app-surface);
      }

      .modal-head,
      .modal-actions {
        background: var(--app-surface);
        border: none;
        box-shadow: none;
      }

      .field.invalid input,

      .field.invalid textarea {
        box-shadow: var(--shadow-inset-soft), 0 0 0 3px rgba(239, 111, 108, 0.2);
      }

      .loading-overlay {
        background: rgba(224, 229, 236, 0.36);
      }

      html[data-theme="dark"] .loading-overlay {
        background: rgba(10, 12, 16, 0.34);
      }

      .loading-copy {
        color: var(--app-text);
      }

      .loading-copy span {
        color: var(--app-muted);
      }

      .spinner {
        border-color: rgba(123, 135, 152, 0.22);
        border-top-color: var(--app-primary);
      }

      @media (min-width: 720px) {
        .task-toolbar {
          grid-template-columns: minmax(0, 1fr) minmax(180px, 240px);
          align-items: end;
        }

        .task-toolbar #taskSearch {
          grid-column: 1 / -1;
        }

        .task-toolbar .filter-row {
          grid-column: 1 / 2;
        }

        .task-toolbar .task-sort-field {
          grid-column: 2 / 3;
        }
      }

        .auth-layout {
          grid-template-columns: minmax(0, 1.06fr) minmax(360px, 0.94fr);
          align-items: start;
        }

        .expense-hero-card {
          grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
          align-items: start;
        }

        .expense-add-btn {
          justify-self: end;
        }

      @media (min-width: 960px) {
        .mvp-shell {
          grid-template-columns: 296px 1fr;
        }

        .mvp-sidebar {
          gap: 24px;
          padding: 28px 20px;
          box-shadow: inset -10px 0 18px rgba(163, 177, 198, 0.18);

          box-shadow: inset -10px 0 18px rgba(10, 12, 16, 0.28);

          justify-items: start;
          padding: 12px 14px;
          font-size: 14px;

        .mvp-main {
          max-width: 1240px;
          padding: 20px 26px 48px;
        }

        .mvp-topbar {
          margin: 0 0 22px;
          padding: 18px 22px;
        }
      }
    
      /* ===== Layout polish patch: responsive, less overlap, cleaner spacing ===== */
      :root {
        --layout-page-max: 1380px;
        --layout-gap: clamp(14px, 1.4vw, 22px);
        --layout-card-pad: clamp(16px, 1.7vw, 24px);
      }

      html { scroll-behavior: smooth; }
      body { overflow-x: hidden; }

      .mvp-shell { width: 100%; }

      .mvp-main {
        width: min(100%, var(--layout-page-max));
        max-width: var(--layout-page-max);
        margin-inline: auto;
        padding-inline: clamp(14px, 2vw, 30px);
      }

      .view-root { gap: var(--layout-gap); }

      .mvp-card,
      .item-card,
      .stat-card,
      .compact-row,
      .top-item { overflow-wrap: anywhere; }

      .mvp-card { padding: var(--layout-card-pad); }

      .mvp-topbar {
        width: 100%;
        min-height: 78px;
      }

      .topbar-title { flex: 1 1 auto; }

      .topbar-title > div,
      .section-head > div,
      .item-top > div,
      .subject-main { min-width: 0; }

      .topbar-actions,
      .section-head .btn { flex: 0 0 auto; }

      #pageTitle,
      .topbar-title h1,
      .section-head h2,
      .item-title,
      .compact-row-title,
      .empty-state strong { letter-spacing: -0.02em; }

      .section-head { align-items: center; }
      .section-head p { max-width: 68ch; }

      .hero-card {
        isolation: isolate;
        padding: clamp(20px, 2.2vw, 30px);
      }

      .hero-card::before {
        inset: clamp(18px, 2vw, 26px) clamp(18px, 2vw, 28px) auto auto;
        width: clamp(70px, 7vw, 110px);
        height: clamp(70px, 7vw, 110px);
        border-radius: 30px;
        opacity: 0.72;
        transform: rotate(8deg);
      }

      .hero-card .section-head,

      /* ===== Standalone auth page fix =====
         The app shell uses author-defined display:grid/flex, so the native
         hidden attribute can be overridden by CSS. Keep hidden elements truly
         hidden and render login/register as a separate full-page route. */
      [hidden] {
        display: none !important;
      }

      body.auth-page {
        min-height: 100svh;
        overflow: hidden;
      }

      body.auth-page #mvpApp,
      body.auth-page #bottomNav {
        display: none !important;

      body.auth-page #authRoot {
        position: fixed;
        inset: 0;
        z-index: 5000;
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 100svh;
        padding: clamp(18px, 3vw, 42px);
        overflow-x: hidden;
        overflow-y: auto;
        color: var(--app-text);
        background:
          radial-gradient(circle at 12% 10%, rgba(45, 212, 191, 0.14), transparent 28%),
          radial-gradient(circle at 88% 82%, rgba(242, 184, 75, 0.1), transparent 26%),
          var(--app-bg);

        background:
          radial-gradient(circle at 12% 10%, rgba(45, 212, 191, 0.1), transparent 28%),

      body.auth-page .auth-layout {

        margin: auto;

      body.app-page #authRoot {
        display: none !important;

      @media (max-width: 899px) {

      /* ===== Required storage/helpers ===== */
      function saveLocal(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function loadLocal(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw === null ? fallback : JSON.parse(raw);
        } catch (error) {
          return fallback;
        }
      }

      function generateLocalUserId() {
        return "local_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
      }

      function removeLocal(key) {
        localStorage.removeItem(key);
      }

      async function runLockedAction(lockKey, task) {
        if (lockKey && actionLocks[lockKey]) {
          return;
        }

        if (lockKey) {
          actionLocks[lockKey] = true;
        }

        try {
          return await task();
        } finally {
          if (lockKey) {
            delete actionLocks[lockKey];
          }
        }
      }

      function setButtonBusyState(button, isBusy, busyText) {
        if (!button) {
          return;
        }

        if (!Object.prototype.hasOwnProperty.call(button.dataset, "idleText")) {
          button.dataset.idleText = button.textContent;
        }

        if (isBusy) {
          button.dataset.wasDisabled = button.disabled ? "true" : "false";
          button.disabled = true;
          button.setAttribute("aria-busy", "true");

          if (busyText) {
            button.textContent = busyText;
          }

          return;
        }

        button.disabled = button.dataset.wasDisabled === "true";
        delete button.dataset.wasDisabled;
        button.removeAttribute("aria-busy");
        button.textContent = button.dataset.idleText || button.textContent;
      }

      function setScopeBusyState(scope, isBusy, busyText) {
        if (!scope) {
          return;
        }

        scope.querySelectorAll("button").forEach((button) => {
          setButtonBusyState(button, isBusy, button.type === "submit" ? busyText : "");
        });
      }

      function setActionButtonsBusyState(actionName, isBusy, busyText) {
        if (!actionName) {
          return;
        }

        document.querySelectorAll('[data-action="' + actionName + '"]').forEach((button) => {
          setButtonBusyState(button, isBusy, busyText);
        });
      }

      function isUnsupportedActionError(error) {
        const message = String((error && error.message) || "");
        return /Action không được hỗ trợ|Action mock chưa hỗ trợ|Thao tác chưa được hỗ trợ trên trình duyệt/i.test(message);
      }

      function isAppsScriptPermissionError(error) {
        const message = String((error && error.message) || "");
        return /do not have permission to call|required permissions:|script\.scriptapp|script\.send_mail|mailapp/i.test(message);
      }

      function toBooleanSetting(value) {
        return value === true || String(value || "").toLowerCase() === "true" || String(value || "") === "1";
      }

      function normalizeReminderOffsets(value) {
        const source = Array.isArray(value) ? value : String(value || "0,1,3").split(",");
        const allowed = { 0: true, 1: true, 3: true, 7: true };
        const seen = Object.create(null);
        const output = [];

        source.forEach((item) => {
          const normalized = Number(String(item || "").trim());

          if (!Number.isFinite(normalized) || !allowed[normalized] || seen[normalized]) {
            return;
          }

          seen[normalized] = true;
          output.push(normalized);
        });

        return output.length ? output.sort((a, b) => a - b) : [0, 1, 3];
      }

      function reminderOffsetLabel(value) {
        const offset = Number(value || 0);
        return offset === 0 ? "Đúng ngày" : `Trước ${offset} ngày`;
      }

      function getSuggestedAppUrl() {
        const currentUrl = String((window.location && window.location.href) || "").trim();
        return /^https?:\/\//i.test(currentUrl) ? currentUrl : "";
      }

      function normalizeSettingsPayload(rawSettings) {
        const settings = Object.assign({}, getDefaultSettings(), rawSettings || {});

        settings.userId = String(settings.userId || state.userId || "");
        settings.displayName = String(settings.displayName || "Sinh viên").trim() || "Sinh viên";
        settings.theme = settings.theme === "dark" ? "dark" : "light";
        settings.currency = "VND";
        settings.monthlyBudget = Math.max(0, Number(settings.monthlyBudget || 0) || 0);
        settings.weekStartsOn = settings.weekStartsOn === "sunday" ? "sunday" : "monday";
        settings.reminderEmail = String(settings.reminderEmail || "").trim();
        settings.emailReminderEnabled = toBooleanSetting(settings.emailReminderEnabled);
        settings.reminderOffsets = normalizeReminderOffsets(settings.reminderOffsets);
        settings.appUrl = String(settings.appUrl || "").trim() || getSuggestedAppUrl();
        return settings;
      }

      function clearDataSnapshot() {
        removeLocal(STORAGE_KEYS.dataSnapshot);
      }

      function safeNumber(value) {
        const number = Number(value || 0);
        return Number.isFinite(number) ? number : 0;
      }

      function buildSafeDashboardSnapshot(source) {
        const data = source || {};
        const deadlineSoonCount = Object.prototype.hasOwnProperty.call(data, "deadlineSoonCount")
          ? safeNumber(data.deadlineSoonCount)
          : state.tasks.map((task) => normalizeTaskRecord(task)).filter((task) => isTaskDueSoon(task, 7)).length;

        return {
          todayTaskCount: safeNumber(data.todayTaskCount),
          overdueTaskCount: safeNumber(data.overdueTaskCount),
          deadlineSoonCount: deadlineSoonCount,
          monthlyExpenseTotal: safeNumber(data.monthlyExpenseTotal),
          monthlyBudget: safeNumber(data.monthlyBudget),
          remainingBudget: safeNumber(data.remainingBudget),
          weeklyStudyMinutes: safeNumber(data.weeklyStudyMinutes),
          currency: String(data.currency || state.settings.currency || "VND")
        };
      }

      function buildSafeExpenseSummarySnapshot(source) {
        const data = source || {};
        return {
          total: safeNumber(data.total),
          averagePerDay: safeNumber(data.averagePerDay),
          topCategory: String(data.topCategory || ""),
          currency: String(data.currency || "VND")
        };
      }

      function buildSafeStudySummarySnapshot(source) {
        const data = source || {};
        return {
          totalMinutes: safeNumber(data.totalMinutes)
        };
      }

      function persistDataSnapshot() {
        if (!isAuthenticated() || state.dataMode !== "cloud") {
          return;
        }

        saveLocal(STORAGE_KEYS.dataSnapshot, {
          userId: state.userId,
          savedAt: new Date().toISOString(),
          displayName: state.displayName || "Sinh viên",
          theme: state.theme === "dark" ? "dark" : "light",
          currentView: VIEWS[state.currentView] ? state.currentView : "dashboard",
          dashboard: buildSafeDashboardSnapshot(state.dashboard),
          expenseSummary: buildSafeExpenseSummarySnapshot(state.expenseSummary),
          studySummary: buildSafeStudySummarySnapshot(state.studySummary)
        });
      }

      function loadDataSnapshotForUser(userId) {
        const snapshot = loadLocal(STORAGE_KEYS.dataSnapshot, null);

        if (!snapshot || String(snapshot.userId || "") !== String(userId || "")) {
          return null;
        }

        const savedAt = Date.parse(String(snapshot.savedAt || ""));

        if (!Number.isFinite(savedAt) || Date.now() - savedAt > CLOUD_SNAPSHOT_TTL_MS) {
          clearDataSnapshot();
          return null;
        }

        return snapshot;
      }

      function applyCachedCloudSnapshot(snapshot) {
        const data = snapshot || {};
        const displayName = String(data.displayName || (data.settings && data.settings.displayName) || "").trim();
        const theme = String(data.theme || (data.settings && data.settings.theme) || "").trim();

        if (displayName) {
          state.displayName = displayName;
        }

        if (theme === "dark" || theme === "light") {
          state.theme = theme;
        }

        if (data.dashboard && typeof data.dashboard === "object") {
          state.dashboard = Object.assign({}, state.dashboard || {}, buildSafeDashboardSnapshot(data.dashboard));
        }

        if (data.expenseSummary && typeof data.expenseSummary === "object") {
          state.expenseSummary = Object.assign({}, state.expenseSummary || {}, buildSafeExpenseSummarySnapshot(data.expenseSummary));
        }

        if (data.studySummary && typeof data.studySummary === "object") {
          state.studySummary = Object.assign({}, state.studySummary || {}, buildSafeStudySummarySnapshot(data.studySummary));
        }

        applyTheme(state.theme);
      }

      function applyLoadedData(payload) {
        const data = payload || {};

        if (data.user) {
          state.authUser = Object.assign({}, state.authUser || {}, data.user);
        }

        if (data.customer) {
          state.customer = Object.assign({}, state.customer || {}, data.customer);

        if (state.authUser) {

        state.settings = normalizeSettingsPayload(data.settings || state.settings);
        state.displayName = state.settings.displayName || "Sinh viên";
        state.theme = state.settings.theme || "light";
        state.subjects = Array.isArray(data.subjects)
          ? data.subjects.slice().sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")))

        state.tasks = Array.isArray(data.tasks)

        state.expenses = Array.isArray(data.expenses)

          : [];
        state.budgets = Array.isArray(data.budgets)
          ? data.budgets.slice().sort((a, b) => String(b.month || "").localeCompare(String(a.month || "")))
          : data.budget && data.budget.budget
            ? [data.budget.budget]
            : [];
        state.studyLogs = Array.isArray(data.studyLogs)
          ? data.studyLogs.slice().sort(sortStudyLogsNewest)
          : [];
        state.gradeRecords = Array.isArray(data.gradeRecords)
          ? data.gradeRecords.map(normalizeGradeRecord).sort(sortGradeRecords)
          : [];
        state.dashboard = data.dashboard ? Object.assign({}, data.dashboard) : computeDashboard(currentMonth());
        state.expenseSummary = data.expenseSummary ? Object.assign({}, data.expenseSummary) : computeExpenseSummary({ month: state.statsMonth || currentMonth() });
        state.studySummary = data.studySummary ? Object.assign({}, data.studySummary) : computeStudySummary({ month: state.statsMonth || currentMonth() });
        state.gpaFilter = normalizeGpaFilter(state.gpaFilter);
        state.gpaSummary = data.gpaSummary ? normalizeGpaSummary(data.gpaSummary) : computeGpaSummary(state.gpaFilter);
        state.authUser = Object.assign({}, state.authUser || {}, { displayName: state.displayName });
        normalizeStudyUiState();
        applyTheme(state.theme);
        persistSettings();
        persistDataSnapshot();
      }

      function hydrateCachedCloudData() {
        const snapshot = loadDataSnapshotForUser(state.userId);

        if (!snapshot) {
          return false;
        }

        applyCachedCloudSnapshot(snapshot);
        state.dataMode = "cloud";
        return true;
      }

      function isAuthenticated() {
        return Boolean(state.sessionToken && state.authUser && state.customer);
      }

      function normalizeAuthScreen(screen) {
        const value = String(screen || "");
        const allowed = {
          login: true,
          register: true,
          verifyRegister: true,
          forgot: true,
          resetPassword: true
        };
        return allowed[value] ? value : "login";
      }

      function setAuthScreen(screen) {
        state.authScreen = normalizeAuthScreen(screen);
        saveLocal(STORAGE_KEYS.authScreen, state.authScreen);
      }

      function resetAppDataState() {
        stopPomodoroTicker();
        stopPomodoroAudio({ keepEnabled: false });
        state.subjects = [];
        state.tasks = [];
        state.expenses = [];
        state.budgets = [];
        state.studyLogs = [];
        state.gradeRecords = [];
        state.dashboard = {};
        state.expenseSummary = {};
        state.studySummary = {};
        state.gpaSummary = {};
        state.gpaFilter = {
          mode: "semester",
          semester: "HK1",
          academicYear: currentAcademicYear()
        };
        state.studyLogForm = {
          subjectId: "",
          taskId: "",
          date: today(),
          minutes: 60,
          note: ""
        };
        state.pomodoro = {
          subjectId: "",
          taskId: "",
          mode: "focus",
          remainingSeconds: POMODORO_FOCUS_SECONDS,
          running: false,
          endsAt: 0,
          activeSubjectId: "",
          activeTaskId: ""
        };
      }

      function applyAuthPayload(authData) {
        const payload = authData || {};
        state.sessionToken = String(payload.sessionToken || state.sessionToken || "");
        state.authUser = payload.user || null;
        state.customer = payload.customer || null;
        state.userId = state.authUser ? String(state.authUser.id || "") : "";
        state.displayName = state.authUser && state.authUser.displayName ? String(state.authUser.displayName) : "Sinh viên";
        state.dataMode = isApiConfigured() ? "cloud" : "mock";
        state.settings = normalizeSettingsPayload(Object.assign({}, state.settings || {}, {
          userId: state.userId,
          displayName: state.displayName
        }));

        if (state.sessionToken) {
          saveLocal(STORAGE_KEYS.sessionToken, state.sessionToken);
        } else {
          removeLocal(STORAGE_KEYS.sessionToken);
        }

        if (state.userId) {
          saveLocal(STORAGE_KEYS.userId, state.userId);
        } else {
          removeLocal(STORAGE_KEYS.userId);
        }
      }

      function clearAuthSession(options) {
        const settings = options || {};
        removeLocal(STORAGE_KEYS.sessionToken);
        clearDataSnapshot();
        state.sessionToken = "";
        state.authUser = null;
        state.customer = null;
        state.userId = "";
        state.dataMode = isApiConfigured() ? "cloud" : "mock";
        state.sessionRestoreInProgress = false;
        resetAppDataState();

        const localSettings = loadLocal(STORAGE_KEYS.settings, {});
        state.displayName = localSettings.displayName || "Sinh viên";
        state.theme = localSettings.theme || state.theme || "light";
        state.settings = getDefaultSettings();
        removeLocal(STORAGE_KEYS.userId);

        if (settings.authScreen) {
          setAuthScreen(settings.authScreen);
        }
      }

        bottomNav.hidden = !authenticated;
        authRoot.hidden = authenticated;

        document.body.classList.toggle("auth-page", !authenticated);
        document.body.classList.toggle("app-page", authenticated);

        if (!authenticated) {
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        }
      }

      async function submitLoginForm(form) {
        return runLockedAction("auth-login", async () => {
          const formData = new FormData(form);
          setScopeBusyState(form, true, "Đang đăng nhập...");
          showLoading();

          try {
            const authData = await api("login", {
              email: String(formData.get("loginEmail") || "").trim(),
              password: String(formData.get("loginPassword") || "")
            });
            applyAuthPayload(authData);
            state.sessionRestoreInProgress = false;
            hydrateCachedCloudData();
            state.currentView = hasAnyUserData() ? "dashboard" : "guide";
            saveLocal(STORAGE_KEYS.currentView, state.currentView);
            syncShellVisibility();
            renderApp();
            showToast("Đăng nhập thành công. Đang đồng bộ dữ liệu...", "success");
            loadAllData({ skipLoading: true }).catch((error) => {
              showToast("Không tải được dữ liệu sau đăng nhập. " + error.message, "warning");
            });
          } finally {
            hideLoading();
            setScopeBusyState(form, false, "Đang đăng nhập...");
          }
        });
      }

      async function submitRegisterForm(form) {
        return runLockedAction("auth-register", async () => {
          const formData = new FormData(form);
          const displayName = String(formData.get("registerDisplayName") || "").trim();
          const email = String(formData.get("registerEmail") || "").trim();
          const password = String(formData.get("registerPassword") || "");
          const confirmPassword = String(formData.get("registerConfirmPassword") || "");

          if (password !== confirmPassword) {
            showToast("Mật khẩu nhập lại chưa khớp.", "error");
            return;
          }

          setScopeBusyState(form, true, "Đang gửi mã...");
          showLoading();

          try {
            await api("requestRegisterVerification", {
              displayName: displayName,
              email: email,
              password: password
            });
            state.pendingRegistration = {
              displayName: displayName,
              customerName: displayName,
              email: email,
              password: password
            };
            // Password is kept only in memory for the resend-code button.
            // The final account creation request below sends only email + verification code.
            setAuthScreen("verifyRegister");
            renderApp();
            showToast("Đã gửi mã xác thực đến email của bạn.", "success");
          } finally {
            hideLoading();
            setScopeBusyState(form, false, "Đang gửi mã...");
          }
        });
      }

      async function resendRegisterVerificationCode() {
        if (!state.pendingRegistration || !state.pendingRegistration.email) {
          setAuthScreen("register");
          renderApp();
          return;
        }

        showLoading();
        try {
          await api("requestRegisterVerification", state.pendingRegistration);
          showToast("Đã gửi lại mã xác thực.", "success");
        } finally {
          hideLoading();
        }
      }

      async function submitVerifyRegisterForm(form) {
        return runLockedAction("auth-verify-register", async () => {
          if (!state.pendingRegistration || !state.pendingRegistration.email) {
            setAuthScreen("register");
            renderApp();
            showToast("Vui lòng nhập lại thông tin tạo tài khoản.", "warning");
            return;
          }

          const formData = new FormData(form);
          const verificationCode = String(formData.get("registerVerificationCode") || "").trim();
          setScopeBusyState(form, true, "Đang tạo tài khoản...");
          showLoading();

          try {
            const authData = await api("register", {
              email: state.pendingRegistration.email,
              displayName: state.pendingRegistration.displayName,
              customerName: state.pendingRegistration.customerName,
              verificationCode: verificationCode
            });
            state.pendingRegistration = null;
            applyAuthPayload(authData);
            state.sessionRestoreInProgress = false;
            hydrateCachedCloudData();
            state.currentView = "guide";
            saveLocal(STORAGE_KEYS.currentView, state.currentView);
            syncShellVisibility();
            renderApp();
            showToast("Tạo tài khoản thành công. Đang đồng bộ dữ liệu...", "success");
            loadAllData({ skipLoading: true }).catch((error) => {
              showToast("Không tải được dữ liệu sau khi tạo tài khoản. " + error.message, "warning");
            });
          } finally {
            hideLoading();
            setScopeBusyState(form, false, "Đang tạo tài khoản...");
          }
        });

          const code = String(formData.get("resetCode") || "").trim();
