      async function logoutApp() {
        showLoading();

        try {
          if (state.sessionToken) {
            try {
              await api("logout", {});
            } catch (error) {
              console.warn(error);
            }
          }
        } finally {
          clearAuthSession({ authScreen: "login" });
          hideLoading();
          renderApp();
        }

        showToast("Đã đăng xuất.", "success");
      }

      async function restoreSession() {
        if (!state.sessionToken) {
          state.sessionRestoreInProgress = false;
          renderApp();
          return;
        }

        state.sessionRestoreInProgress = true;
        renderApp();

        try {
          const authData = await api("me", {});
          applyAuthPayload(Object.assign({}, authData, { sessionToken: state.sessionToken }));
          const hydratedFromCache = hydrateCachedCloudData();
          state.sessionRestoreInProgress = false;

          if (hydratedFromCache) {
            renderApp();
          }

          await loadAllData({ skipLoading: hydratedFromCache });
        } catch (error) {
          state.sessionRestoreInProgress = false;
          clearAuthSession({ authScreen: "login" });
          renderApp();
          showToast("Phiên đăng nhập đã hết hạn hoặc không còn hợp lệ. Vui lòng đăng nhập lại.", "warning");
        }
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("vi-VN", {
          style: "currency",
          currency: "VND",
          maximumFractionDigits: 0
        }).format(Number(value || 0));
      }

      function formatDate(value) {
        if (!value) {
          return "Chưa có ngày";
        }

        const date = new Date(String(value) + "T00:00:00");

        if (Number.isNaN(date.getTime())) {
          return String(value);
        }

        return new Intl.DateTimeFormat("vi-VN", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric"
        }).format(date);
      }

      function formatStudyDuration(value) {
        const totalMinutes = Math.max(0, Math.round(Number(value || 0) || 0));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        if (hours && minutes) {
          return `${hours} giờ ${minutes} phút`;
        }

        if (hours) {
          return `${hours} giờ`;
        }

        return `${minutes} phút`;
      }

      function formatStudyDurationCompact(value) {
        const totalMinutes = Math.max(0, Math.round(Number(value || 0) || 0));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        if (hours && minutes) {
          return `${hours}h ${minutes}p`;
        }

        if (hours) {
          return `${hours}h`;
        }

        return `${minutes}p`;
      }

      function formatPomodoroTime(seconds) {
        const totalSeconds = Math.max(0, Math.round(Number(seconds || 0) || 0));
        const minutes = Math.floor(totalSeconds / 60);
        const remainingSeconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;
      }

      function showLoading() {
        loadingDepth += 1;
        loadingOverlay.classList.add("open");
        loadingOverlay.setAttribute("aria-hidden", "false");
      }

      function hideLoading() {
        loadingDepth = Math.max(0, loadingDepth - 1);

        if (loadingDepth > 0) {
          return;
        }

        loadingOverlay.classList.remove("open");
        loadingOverlay.setAttribute("aria-hidden", "true");
      }

      function showToast(message, type) {
        const tone = ({ success: "success", error: "error", warning: "warning", info: "info" })[type] || "info";
        const title = { success: "Thành công", error: "Có lỗi xảy ra", warning: "Cần lưu ý", info: "Thông báo" }[tone];
        const icon = { success: "✓", error: "!", warning: "!", info: "i" }[tone];
        const toast = document.createElement("div");
        toast.className = "toast " + tone;
        toast.setAttribute("role", tone === "error" ? "alert" : "status");
        toast.innerHTML = `
          <div class="toast-icon" aria-hidden="true">${icon}</div>
          <div class="toast-copy">
            <strong>${title}</strong>
            <span>${escapeHtml(String(message || ""))}</span>
          </div>
        `;
        toastRoot.appendChild(toast);

        while (toastRoot.childElementCount > 3) {
          toastRoot.removeChild(toastRoot.firstElementChild);
        }

        setTimeout(() => {
          toast.classList.add("toast-leave");
          setTimeout(() => toast.remove(), 180);
        }, 3200);
      }

      function showEmptyState(message) {
        return `
          <div class="empty-state">
            <div class="empty-state-icon" aria-hidden="true">✦</div>
            <strong>Chưa có dữ liệu</strong>
            <p>${escapeHtml(message)}</p>
          </div>
        `;
      }

      function closeModal() {
        modalRoot.classList.remove("open");
        modalRoot.setAttribute("aria-hidden", "true");
        modalRoot.innerHTML = "";
      }

      function showModal(title, html, onSubmit) {
        modalRoot.innerHTML = `
          <div class="modal-panel" role="dialog" aria-modal="true" aria-label="${escapeHtml(title)}">
            <div class="modal-head">
              <strong>${escapeHtml(title)}</strong>
              <button class="icon-btn" data-action="close-modal" type="button">×</button>
            </div>
            <form id="modalForm">
              <div class="modal-body">
                <div class="modal-inline-error" data-modal-error hidden></div>
                ${html}
              </div>
              <div class="modal-actions">
                <button class="btn btn-ghost" data-action="close-modal" type="button">Hủy</button>
                <button class="btn btn-primary" type="submit">Lưu</button>
              </div>
            </form>
          </div>
        `;
        modalRoot.classList.add("open");
        modalRoot.setAttribute("aria-hidden", "false");
        modalRoot.querySelector("#modalForm").addEventListener("submit", async (event) => {
          event.preventDefault();

          try {
            const form = event.currentTarget;
            const scope = form.closest(".modal-panel") || form;
            const formData = new FormData(form);
            clearModalErrors(form);

            await runLockedAction("modal-form-submit", async () => {
              setScopeBusyState(scope, true, "Đang lưu...");

              try {
                await onSubmit(formData, form);
              } finally {
                setScopeBusyState(scope, false, "Đang lưu...");
              }
            });
          } catch (error) {
            showModalError(event.currentTarget, error);
            showToast(error.message || "Không thể lưu dữ liệu.", "error");
          }
        });
      }

      function createValidationError(message, fieldName) {
        const error = new Error(message || "Dữ liệu không hợp lệ.");
        error.fieldName = fieldName || "";
        return error;
      }

      function clearModalErrors(form) {
        if (!form) {
          return;
        }

        const modalError = form.querySelector("[data-modal-error]");

        if (modalError) {
          modalError.hidden = true;
          modalError.textContent = "";
        }

        form.querySelectorAll(".field.invalid").forEach((field) => field.classList.remove("invalid"));
        form.querySelectorAll(".field-error").forEach((errorEl) => {
          errorEl.hidden = true;
          errorEl.textContent = "";
        });
      }

      function showModalError(form, error) {
        if (!form) {
          return;
        }

        const message = error && error.message ? error.message : "Không thể lưu dữ liệu.";
        const modalError = form.querySelector("[data-modal-error]");

        if (modalError) {
          modalError.textContent = message;
          modalError.hidden = false;
        }

        if (error && error.fieldName) {
          const fieldEl = form.elements[error.fieldName];
          const wrapper = fieldEl ? fieldEl.closest(".field") : null;
          const fieldError = wrapper ? wrapper.querySelector(".field-error") : null;

          if (wrapper) {
            wrapper.classList.add("invalid");
          }

          if (fieldError) {
            fieldError.textContent = message;
            fieldError.hidden = false;
          }

          if (fieldEl && typeof fieldEl.focus === "function") {
            fieldEl.focus();
          }
        }
      }

      function confirmDialog(message) {
        return new Promise((resolve) => {
          modalRoot.innerHTML = `
            <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Xác nhận">
              <div class="modal-head">
                <strong>Xác nhận</strong>
                <button class="icon-btn" type="button" id="confirmNoTop">×</button>
              </div>
              <div class="modal-body">
                <p class="muted">${escapeHtml(message)}</p>
              </div>
              <div class="modal-actions">
                <button class="btn btn-ghost" type="button" id="confirmNo">Hủy</button>
                <button class="btn btn-danger" type="button" id="confirmYes">Đồng ý</button>
              </div>
            </div>
          `;
          modalRoot.classList.add("open");
          modalRoot.setAttribute("aria-hidden", "false");

          const done = (value) => {
            closeModal();
            resolve(value);
          };

          document.getElementById("confirmYes").onclick = () => done(true);
          document.getElementById("confirmNo").onclick = () => done(false);
          document.getElementById("confirmNoTop").onclick = () => done(false);
        });
      }

      /* ===== API and data loading ===== */
      async function api(action, payload) {
        const requestPayload = Object.assign({}, payload || {});
        const publicActions = {
          health: true,
          initDatabase: true,
          login: true,
          register: true,
          requestRegisterVerification: true,
          requestPasswordReset: true,
          resetPassword: true
        };
        const shouldUseMock = !isApiConfigured();

        if (!publicActions[action] && state.sessionToken) {
          requestPayload.sessionToken = state.sessionToken;
        }

        if (shouldUseMock) {
          return mockApi(action, requestPayload);
        }

        const response = await fetch(window.APP_CONFIG.API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: action,
            payload: requestPayload
          })
        });
        const result = await response.json();

        if (!result || typeof result.ok !== "boolean") {
          throw new Error("Hệ thống không trả về đúng định dạng dữ liệu.");
        }

        if (!result.ok) {
          const message = result.error || "Hệ thống trả về lỗi không xác định.";

          if (!publicActions[action] && /phiên đăng nhập|sessiontoken|đăng nhập/i.test(String(message))) {
            clearAuthSession({ authScreen: "login" });
            renderApp();
          }

          throw new Error(message);
        }

        return result.data;
      }

      async function loadAllData(options) {
        const settings = Object.assign({ skipLoading: false }, options || {});

        if (!isAuthenticated()) {
          state.sessionRestoreInProgress = false;
          syncShellVisibility();
          renderApp();
          return;
        }

        if (!settings.skipLoading) {
          showLoading();
        }

        try {
          if (isApiConfigured()) {
            state.dataMode = "cloud";
            await loadRemoteData();
          } else {
            state.dataMode = "mock";
            loadMockDataIntoState();
          }
        } catch (error) {
          if (isApiConfigured()) {
            showToast("Không tải được dữ liệu đồng bộ. " + error.message, "error");
          } else {
            showToast("Không tải được dữ liệu trên trình duyệt. " + error.message, "error");
          }
        } finally {
          if (!settings.skipLoading) {
            hideLoading();
          }

          renderApp();
        }
      }

      async function loadRemoteData() {
        const expenseMonth = state.expenseMonth || currentMonth();
        const statsMonth = state.statsMonth || currentMonth();
        const dashboardMonth = currentMonth();

        if (runtimeFeatures.loadInitialData !== false) {
          try {
            const initialData = await api("loadInitialData", {
              month: dashboardMonth,
              expenseMonth: expenseMonth,
              statsMonth: statsMonth,
              gpaMode: state.gpaFilter.mode,
              gpaSemester: state.gpaFilter.semester,
              gpaAcademicYear: state.gpaFilter.academicYear
            });

            runtimeFeatures.loadInitialData = true;
            applyLoadedData(initialData || {});
            return;
          } catch (error) {
            if (!isUnsupportedActionError(error)) {
              throw error;
            }

            runtimeFeatures.loadInitialData = false;
          }
        }

        await loadRemoteDataLegacy();
      }

      async function loadRemoteDataLegacy() {
        const expenseMonth = state.expenseMonth || currentMonth();
        const statsMonth = state.statsMonth || currentMonth();
        const dashboardMonth = currentMonth();
        const [settings, subjects, tasks, expenses, budget, studyLogs, dashboard, expenseSummary, studySummary] = await Promise.all([
          api("getSettings", {}),
          api("listSubjects", {}),
          api("listTasks", {}),
          api("listExpenses", {}),
          api("getBudget", { month: expenseMonth }),
          api("listStudyLogs", {}),
          api("getDashboard", { month: dashboardMonth }),
          api("getExpenseSummary", { month: statsMonth }),
          api("getStudySummary", { month: statsMonth })
        ]);

        applyLoadedData({
          settings: settings || {},
          subjects: subjects.items || [],
          tasks: tasks.items || [],
          expenses: expenses.items || [],
          budgets: budget && budget.budget ? [budget.budget] : [],
          studyLogs: studyLogs.items || [],
          dashboard: dashboard || {},
          expenseSummary: expenseSummary || {},
          studySummary: studySummary || {}
        });
      }

      function loadMockDataIntoState() {
        const data = getMockData();
        state.subjects = data.subjects || [];
        state.tasks = (data.tasks || []).map(normalizeTaskRecord);
        state.expenses = data.expenses || [];
        state.budgets = data.budgets || [];
        state.studyLogs = data.studyLogs || [];
        state.gradeRecords = (data.gradeRecords || []).map(normalizeGradeRecord).sort(sortGradeRecords);
        state.settings = normalizeSettingsPayload(data.settings || {});
        state.displayName = state.settings.displayName || "Sinh viên";
        state.theme = state.settings.theme || "light";
        state.dashboard = computeDashboard(currentMonth());
        state.expenseSummary = computeExpenseSummary({ month: state.statsMonth || currentMonth() });
        state.studySummary = computeStudySummary({ month: state.statsMonth || currentMonth() });
        state.gpaFilter = normalizeGpaFilter(state.gpaFilter);

      function refreshClientSummaries() {
        state.dashboard = computeDashboard(currentMonth());
        state.expenseSummary = computeExpenseSummary({ month: state.statsMonth || currentMonth() });
        state.studySummary = computeStudySummary({ month: state.statsMonth || currentMonth() });

      async function ensureBudgetLoadedForMonth(month) {
        const targetMonth = String(month || currentMonth());

        if (!isAuthenticated() || !isApiConfigured()) {
          return;
        }

        if (state.budgets.some((budget) => String(budget.month || "") === targetMonth)) {
          return;
        }

        try {
          const budget = await api("getBudget", { month: targetMonth });
          upsertBudgetState(budget);
          persistDataSnapshot();
        } catch (error) {
          showToast("Không tải được ngân sách tháng đã chọn. " + error.message, "warning");
        }
      }

      function upsertStateItem(collectionName, item, normalizer) {
        if (!item || !item.id || !Array.isArray(state[collectionName])) {
          return null;
        }

        const normalized = normalizer ? normalizer(item) : item;
        const index = state[collectionName].findIndex((current) => String(current.id || "") === String(normalized.id || ""));

        if (index === -1) {
          state[collectionName].push(normalized);
        } else {
          state[collectionName][index] = Object.assign({}, state[collectionName][index], normalized);
        }

        return normalized;
      }

      function removeStateItem(collectionName, id) {
        if (!id || !Array.isArray(state[collectionName])) {
          return;
        }

        state[collectionName] = state[collectionName].filter((item) => String(item.id || "") !== String(id));
      }

      function upsertBudgetState(budget) {
        const item = budget && budget.budget ? budget.budget : budget;

        if (!item || !item.month) {
          return null;
        }

        const index = state.budgets.findIndex((current) => String(current.month || "") === String(item.month || ""));

        if (index === -1) {
          state.budgets.push(item);
        } else {
          state.budgets[index] = Object.assign({}, state.budgets[index], item);
        }

        return item;
      }

      function renderAfterDataMutation(scopeName) {
        refreshClientSummaries();

        if (scopeName === "tasks" && state.currentView === "tasks") {
          const list = document.getElementById("taskList");

          if (list) {
            list.innerHTML = renderTasksListHtml();
            requestAnimationFrame(enhanceInterfaceMotion);
            return;
          }
        }

        renderApp();
      }

      function applyCrudResponseToState(action, data) {
        const response = data || {};

        if (action === "createSubject" || action === "updateSubject") {
          upsertStateItem("subjects", response);
          return "subjects";
        }

        if (action === "deleteSubject") {
          removeStateItem("subjects", response.id);
          return "subjects";
        }

        if (action === "createTask" || action === "updateTask" || action === "completeTask") {
          upsertStateItem("tasks", response, normalizeTaskRecord);
          return "tasks";
        }

        if (action === "deleteTask") {
          removeStateItem("tasks", response.id);
          return "tasks";
        }

        if (action === "createExpense" || action === "updateExpense") {
          upsertStateItem("expenses", response);
          return "expenses";
        }

        if (action === "deleteExpense") {
          removeStateItem("expenses", response.id);
          return "expenses";
        }

        if (action === "upsertBudget") {
          upsertBudgetState(response);
          return "budget";
        }

        if (action === "createStudyLog") {
          upsertStateItem("studyLogs", response);
          return "studyLogs";
        }

        if (action === "deleteStudyLog") {
          removeStateItem("studyLogs", response.id);
          return "studyLogs";
        }

        if (action === "createGradeRecord" || action === "updateGradeRecord") {
          upsertStateItem("gradeRecords", response, normalizeGradeRecord);
          return "gradeRecords";
        }

        if (action === "deleteGradeRecord") {
          removeStateItem("gradeRecords", response.id);
          return "gradeRecords";
        }

        return "";
      }

      function getDashboardNotifications() {
        const dashboard = getDashboardInsights();
        const notifications = [];
        const currentBudget = findBudget(currentMonth());
        const monthExpenses = filterExpenses(state.expenses, { month: currentMonth() });
        const budgetStatus = computeBudgetStatus(currentBudget, monthExpenses);

        if ((dashboard.overdueTaskCount || 0) > 0) {
          notifications.push({ type: "danger", title: "Có việc quá hạn", message: `${dashboard.overdueTaskCount} công việc cần xử lý ngay.` });
        }

        if ((dashboard.deadlineSoonCount || 0) > 0) {

        }

        if (budgetStatus.totalBudget > 0 && budgetStatus.usagePercent >= 80) {
          notifications.push({ type: budgetStatus.usagePercent >= 100 ? "danger" : "warning", title: "Ngân sách cần chú ý", message: `Bạn đã dùng ${budgetStatus.usagePercent}% ngân sách tháng.` });

        if ((dashboard.weeklyStudyMinutes || 0) <= 0) {
          notifications.push({ type: "warning", title: "Chưa có giờ học tuần này", message: "Hãy ghi nhật ký học hoặc bắt đầu một phiên Pomodoro." });

        if (!notifications.length) {
          notifications.push({ type: "success", title: "Mọi thứ đang ổn", message: "Chưa có cảnh báo quan trọng trong hôm nay." });

        return notifications;

      function getCalendarTasksForMonth(month) {
        const targetMonth = String(month || currentMonth());
        return state.tasks.map(normalizeTaskRecord).filter((task) => {

        }).sort(sortByDueDate);

      function renderDeadlineCalendar(month) {
        const targetMonth = String(month || currentMonth());
        const [year, monthIndexRaw] = targetMonth.split("-").map(Number);
        if (!year || !monthIndexRaw) {
          return "";
        }

        const firstDay = new Date(year, monthIndexRaw - 1, 1);
        const startOffset = (firstDay.getDay() + 6) % 7;
        const startDate = new Date(year, monthIndexRaw - 1, 1 - startOffset);
        const tasks = getCalendarTasksForMonth(targetMonth);
        const tasksByDay = tasks.reduce((map, task) => {
          const key = String(task.dueDate || "").slice(0, 10);
          if (!map[key]) map[key] = [];
          map[key].push(task);
          return map;
        }, {});
        const todayKey = today();
        const cells = [];

        for (let i = 0; i < 42; i += 1) {
          const date = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
          const key = date.toISOString().slice(0, 10);
          const isCurrentMonth = key.slice(0, 7) === targetMonth;
          const dayTasks = tasksByDay[key] || [];
          cells.push(`
            <article class="calendar-day ${isCurrentMonth ? "" : "is-muted"} ${key === todayKey ? "is-today" : ""}">
              <strong>${date.getDate()}</strong>
              ${dayTasks.slice(0, 3).map((task) => `<span class="calendar-event" title="${escapeAttr(task.title)}">${escapeHtml(task.title)}</span>`).join("")}
              ${dayTasks.length > 3 ? `<span>+${dayTasks.length - 3} việc khác</span>` : ""}
            </article>
          `);
        }

        return `
          <section class="mvp-card">
            <div class="section-head">
              <div>
                <h2>Lịch deadline tháng</h2>
                <p>Xem nhanh hạn nộp theo ngày để chủ động sắp xếp lịch học.</p>
              </div>
              <span class="badge-status">${escapeHtml(targetMonth)}</span>
            </div>
            <div class="calendar-grid">
              ${["T2", "T3", "T4", "T5", "T6", "T7", "CN"].map((d) => `<div class="stat-label" style="padding:0 8px 4px;">${d}</div>`).join("")}
              ${cells.join("")}
            </div>
          </section>
        `;
      }

      function renderStudy() {

            <div class="section-head">
              <div>

              <span class="badge-status">${escapeHtml(selectedMonth)}</span>
            </div>
            <div class="study-overview-grid">

                <strong>${formatStudyDurationCompact(studySummary.totalMinutes || 0)}</strong>

        const summary = computeGpaSummary(filter);
        const visibleRecords = filterGradeRecords(state.gradeRecords, filter);

        state.gpaSummary = summary;

        return `
          <section class="mvp-card">
            <div class="section-head">
              <div>
                <h2>GPA / Điểm học kỳ</h2>

              <button class="btn btn-primary" data-action="add-grade-record" type="button">+ Thêm điểm</button>

            <div class="gpa-filter-card">

            <section class="grid-cards" style="margin-top:14px;">

              ${statCard("GPA hệ 4.0", formatGpaValue(summary.gpa4))}
              ${statCard("Tín chỉ tính GPA", formatGpaValue(summary.totalCredits))}
              ${statCard("Số môn", summary.subjectCount)}
              ${statCard("Xếp loại", summary.classification)}

      /* ===== Card and chart components ===== */
      function statCard(label, value) {
        return `
          <article class="stat-card">
            <div class="stat-label">${escapeHtml(label)}</div>
            <div class="stat-value">${escapeHtml(String(value))}</div>
          </article>
        `;
      }

      function renderSubjectDetail(label, value) {
        return `
          <div class="subject-detail">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(value)}</strong>
          </div>
        `;
      }

      function renderSubjectCard(subject) {
        const color = normalizeSubjectColor(subject.color);
        const taskCount = getSubjectTaskCount(subject.id);
        return `
          <article class="item-card subject-card has-card-actions" style="--subject-color:${escapeAttr(color)};">
            ${renderCardQuickActions([
              { kind: "edit", action: "edit-subject", id: subject.id, label: "Sửa môn học" },
              { kind: "delete", action: "delete-subject", id: subject.id, label: "Xóa môn học" }
            ])}
            <div class="item-top subject-card-top">
              <div class="subject-main">
                <div class="subject-title-row">
                  <span class="subject-color-dot" aria-hidden="true"></span>
                  <h3 class="item-title">${escapeHtml(subject.name)}</h3>
                </div>
                <div class="item-meta">
                  <span>${escapeHtml(subject.teacher || "Chưa có giảng viên")}</span>
                  <span>${escapeHtml(subject.room || "Chưa có phòng học")}</span>
                </div>
              </div>
              <div class="subject-card-aside">
                <span class="badge-soft badge-info">${escapeHtml(subject.semester || "Chưa có học kỳ")}</span>
                <span class="subject-credit-pill">${escapeHtml(String(Math.max(0, Number(subject.credit || 0) || 0)))} tín chỉ</span>
              </div>
            </div>
            <div class="subject-detail-grid">
              ${renderSubjectDetail("Công việc liên quan", String(taskCount))}
              ${renderSubjectDetail("Màu môn học", color)}
            </div>
            <div class="subject-note">
              <strong>Ghi chú</strong>
              <div class="muted">${escapeHtml(subject.note || "Chưa có ghi chú.")}</div>
            </div>

          </article>
        `;
      }

      function renderTaskCard(task) {
        const item = normalizeTaskRecord(task);
        const done = item.status === "done";
        const subject = item.subjectId ? findById(state.subjects, item.subjectId) : null;
        const overdue = isTaskOverdue(item);

        return `
          <article class="item-card task-card has-card-actions ${overdue ? "task-card-overdue" : ""}">
            ${renderCardQuickActions([
              { kind: "edit", action: "edit-task", id: item.id, label: "Sửa công việc" },
              { kind: "delete", action: "delete-task", id: item.id, label: "Xóa công việc" }
            ])}
            <div class="item-top">
              <div>
                <div class="task-badges">
                  <span class="badge-soft badge-info">${escapeHtml(typeLabel(item.type))}</span>
                  <span class="badge-soft badge-priority-${escapeAttr(normalizeTaskPriority(item.priority))}">${escapeHtml(priorityLabel(item.priority))}</span>
                  <span class="badge-status badge-status-${escapeAttr(normalizeTaskStatus(item.status))}">${escapeHtml(statusLabel(item.status))}</span>
                  ${overdue ? `<span class="badge-status task-overdue-badge">Quá hạn</span>` : ""}
                </div>
                <h3 class="item-title">${done ? "✓ " : ""}${escapeHtml(item.title)}</h3>
                <div class="item-meta">
                  ${subject ? `<span>${escapeHtml(subject.name)}</span>` : ""}
                  <span>${escapeHtml(formatTaskDeadline(item))}</span>
                  <span>${Number(item.estimatedMinutes || 0)} phút</span>
                </div>
              </div>
              ${item.subjectId && subject ? `<span class="badge-soft badge-info">${escapeHtml(subject.name)}</span>` : ""}
            </div>
            ${item.description ? `<p class="muted">${escapeHtml(item.description)}</p>` : ""}

              ${item.status !== "todo" ? `<button class="btn btn-ghost" data-action="set-task-status" data-id="${escapeAttr(item.id)}" data-status="todo" type="button">Chuyển về cần làm</button>` : ""}
              ${item.status !== "doing" ? `<button class="btn btn-secondary" data-action="set-task-status" data-id="${escapeAttr(item.id)}" data-status="doing" type="button">Chuyển sang đang làm</button>` : ""}
              ${item.status !== "done" ? `<button class="btn btn-primary" data-action="complete-task" data-id="${escapeAttr(item.id)}" type="button">Hoàn thành</button>` : ""}
            </div>

        `;

            </div>
          </article>
        `;

      function renderCompactExpenseRow(expense) {
        return `

        const current = Number(value || 0);

        return `

          <p class="muted">${total > 0 ? `Đã dùng ${rawPercent}% ngân sách tháng.` : "Chưa đặt ngân sách tháng."}</p>

      function renderBudgetAlert(budgetStatus) {
        if (!budgetStatus || budgetStatus.totalBudget <= 0) {
          return "";
        }

        if (budgetStatus.usagePercent >= 100) {
          return `<div class="budget-alert danger">Bạn đã vượt ${formatCurrency(Math.abs(budgetStatus.remainingAmount))} so với ngân sách tháng.</div>`;
        }

        if (budgetStatus.usagePercent >= 80) {
          return `<div class="budget-alert warning">Bạn đã dùng ${budgetStatus.usagePercent}% ngân sách tháng. Hãy cân nhắc giảm chi tiêu.</div>`;
        }

        return "";
      }

      function renderBarChart(data, isMoney, options) {
        const settings = Object.assign({
          keepOrder: false,
          labelFormatter: null,
          valueFormatter: null,
          emptyMessage: "Chưa có dữ liệu để hiển thị biểu đồ."
        }, options || {});
        const source = Array.isArray(data) ? data.slice() : Object.entries(data || {});
        const entries = source
          .map((entry) => [entry[0], Number(entry[1] || 0)])
          .filter((entry) => Number(entry[1] || 0) > 0);

        if (!entries.length) {
          return showEmptyState(settings.emptyMessage);
        }

        if (!settings.keepOrder) {
          entries.sort((a, b) => Number(b[1] || 0) - Number(a[1] || 0));
        }

        const max = Math.max(...entries.map((entry) => Number(entry[1] || 0)), 1);

        return `
          <div class="chart-row">
            ${entries.map(([key, value]) => {
              const label = settings.labelFormatter ? settings.labelFormatter(key, value) : (CATEGORY_LABELS[key] || key);
              const percent = Math.round((Number(value || 0) / max) * 100);
              const displayValue = settings.valueFormatter ? settings.valueFormatter(value, key) : (isMoney ? formatCurrency(value) : Number(value || 0));
              return `
                <div class="bar-line">
                  <strong>${escapeHtml(label)}</strong>
                  <div class="bar-track"><div class="bar-fill" style="width:${percent}%"></div></div>
                  <span>${escapeHtml(String(displayValue))}</span>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }
